<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修炼面板</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<style>
/* ====== 全局变量与基础 ====== */
.cultivation-root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #111128;
  --bg-card: rgba(20, 20, 50, 0.85);
  --bg-card-hover: rgba(30, 30, 70, 0.95);
  --border-glow: rgba(180, 140, 255, 0.3);
  --border-glow-hover: rgba(200, 160, 255, 0.6);
  --text-primary: #e8e0f0;
  --text-secondary: #a098b8;
  --text-dim: #706888;
  --accent-gold: #d4a574;
  --accent-purple: #a855f7;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-orange: #f97316;
  --quality-common: #9e9e9e;
  --quality-good: #4caf50;
  --quality-fine: #2196f3;
  --quality-epic: #9c27b0;
  --quality-legend: #ff9800;
  --quality-myth: #f44336;
  --glow-gold: 0 0 10px rgba(212,165,116,0.5), 0 0 20px rgba(212,165,116,0.3);
  --glow-purple: 0 0 10px rgba(168,85,247,0.5), 0 0 20px rgba(168,85,247,0.3);
  font-family: 'Noto Serif SC', 'Source Han Serif CN', 'SimSun', serif;
  color: var(--text-primary);
  max-width: 900px;
  margin: 10px auto;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border-glow);
  box-shadow: 0 0 40px rgba(168,85,247,0.15), inset 0 0 60px rgba(10,10,26,0.8);
}
.cultivation-root .dynamic-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.cultivation-root .bg-orb {
  position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15;
  animation: orbFloat 20s infinite ease-in-out;
}
.cultivation-root .bg-orb:nth-child(1) {
  width: 300px; height: 300px; background: var(--accent-purple);
  top: -50px; left: -50px; animation-duration: 22s;
}
.cultivation-root .bg-orb:nth-child(2) {
  width: 250px; height: 250px; background: var(--accent-blue);
  bottom: -30px; right: -30px; animation-duration: 18s; animation-delay: -6s;
}
.cultivation-root .bg-orb:nth-child(3) {
  width: 200px; height: 200px; background: var(--accent-gold);
  top: 40%; left: 50%; animation-duration: 25s; animation-delay: -12s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.1); }
  50% { transform: translate(-20px, 30px) scale(0.9); }
  75% { transform: translate(15px, 15px) scale(1.05); }
}
.cultivation-root .particle {
  position: absolute; width: 2px; height: 2px; background: var(--accent-gold);
  border-radius: 50%; opacity: 0; pointer-events: none;
  animation: particleRise 8s infinite linear;
}
@keyframes particleRise {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-400px) scale(0); }
}
.cultivation-root .panel-content {
  position: relative; z-index: 1; padding: 20px;
}
.cultivation-root .panel-title {
  text-align: center; font-size: 28px; font-weight: 700;
  margin-bottom: 24px; position: relative;
  background: linear-gradient(135deg, var(--accent-gold), #ffd700, var(--accent-gold));
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmerText 3s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(212,165,116,0.4));
}
@keyframes shimmerText {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.cultivation-root .panel-title::after {
  content: ''; display: block; width: 120px; height: 2px; margin: 10px auto 0;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  animation: lineGlow 2s ease-in-out infinite;
}
@keyframes lineGlow {
  0%, 100% { opacity: 0.5; width: 80px; }
  50% { opacity: 1; width: 160px; }
}
.cultivation-root .panel-details { margin: 0; border: none; }
.cultivation-root .panel-summary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 20px; cursor: pointer; list-style: none;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
  border: 1px solid var(--border-glow);
  border-radius: 12px; font-size: 18px; font-weight: 600;
  color: var(--accent-gold);
  text-shadow: 0 0 10px rgba(212,165,116,0.3);
  transition: all 0.3s ease;
}
.cultivation-root .panel-summary::-webkit-details-marker { display: none; }
.cultivation-root .panel-summary:hover {
  border-color: var(--border-glow-hover); box-shadow: var(--glow-gold);
}
.cultivation-root .panel-summary .toggle-arrow {
  transition: transform 0.3s ease; font-size: 14px;
}
.cultivation-root .panel-details[open] .toggle-arrow { transform: rotate(180deg); }
.cultivation-root .fold-settings-btn {
  margin-left: auto;
  padding: 4px 10px;
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 6px;
  background: rgba(168,85,247,0.1);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cultivation-root .fold-settings-btn:hover {
  border-color: var(--accent-purple);
  color: var(--accent-purple);
  background: rgba(168,85,247,0.2);
}
.cultivation-root .fold-settings-btn.is-folded {
  color: var(--accent-cyan);
  border-color: rgba(6,182,212,0.4);
  background: rgba(6,182,212,0.1);
}
.cultivation-root .char-select-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px; justify-content: center;
  animation: fadeSlideIn 0.6s ease;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.cultivation-root .char-btn {
  padding: 8px 18px; border: 1px solid var(--border-glow);
  border-radius: 8px; background: var(--bg-card);
  color: var(--text-secondary); cursor: pointer; font-size: 14px;
  font-family: inherit; transition: all 0.3s ease;
  position: relative; overflow: hidden;
}
.cultivation-root .char-btn::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.15), transparent);
  transition: left 0.5s ease;
}
.cultivation-root .char-btn:hover::before { left: 100%; }
.cultivation-root .char-btn:hover {
  border-color: var(--accent-purple); color: var(--text-primary);
  box-shadow: var(--glow-purple);
}
.cultivation-root .char-btn.active {
  background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(59,130,246,0.15));
  border-color: var(--accent-purple); color: var(--accent-gold);
  box-shadow: var(--glow-purple);
}
.cultivation-root .char-btn:active { transform: scale(0.95); }
.cultivation-root .main-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
}
@media (max-width: 680px) {
  .cultivation-root .main-grid { grid-template-columns: 1fr; }
}
.cultivation-root .card {
  background: var(--bg-card); border: 1px solid var(--border-glow);
  border-radius: 12px; padding: 16px; position: relative;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s ease; overflow: hidden;
  animation: cardEnter 0.5s ease backwards;
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.cultivation-root .card:hover {
  border-color: var(--border-glow-hover);
  box-shadow: 0 4px 20px rgba(168,85,247,0.1);
}
.cultivation-root .card-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  color: var(--accent-gold); display: flex; align-items: center; gap: 8px;
  text-shadow: 0 0 8px rgba(212,165,116,0.3);
}
.cultivation-root .card-title i { font-size: 14px; }
.cultivation-root .card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border-radius: 12px;
  background: linear-gradient(45deg, transparent 40%, rgba(168,85,247,0.1) 50%, transparent 60%);
  background-size: 300% 300%; opacity: 0;
  animation: borderShimmer 4s ease-in-out infinite;
  pointer-events: none; z-index: 0;
}
.cultivation-root .card:hover::before { opacity: 1; }
@keyframes borderShimmer {
  0% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
.cultivation-root .attr-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(168,85,247,0.1);
  position: relative; z-index: 1;
}
.cultivation-root .attr-row:last-child { border-bottom: none; }
.cultivation-root .attr-label {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-secondary); font-size: 14px;
}
.cultivation-root .attr-value {
  font-size: 16px; font-weight: 600; color: var(--text-primary);
  transition: all 0.3s ease;
}
.cultivation-root .attr-value.highlight {
  color: var(--accent-gold); text-shadow: 0 0 8px rgba(212,165,116,0.4);
}
.cultivation-root .tooltip-trigger {
  position: relative; cursor: help; color: var(--text-dim); font-size: 12px;
}
.cultivation-root .tooltip-bubble {
  position: absolute; bottom: 130%; left: 50%;
  transform: translateX(-50%); background: var(--bg-secondary);
  border: 1px solid var(--accent-purple);
  border-radius: 8px; padding: 8px 12px; font-size: 12px;
  color: var(--text-primary); white-space: nowrap;
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: all 0.2s ease; z-index: 100;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
.cultivation-root .tooltip-bubble::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: var(--accent-purple);
}
.cultivation-root .tooltip-trigger:hover .tooltip-bubble {
  opacity: 1; visibility: visible;
}
.cultivation-root .radar-container {
  display: flex; justify-content: center; align-items: center;
  padding: 10px 0; position: relative; z-index: 1;
}
.cultivation-root .radar-container canvas { max-width: 100%; height: auto; }
.cultivation-root .train-section {
  margin-bottom: 16px; animation: cardEnter 0.6s ease backwards; animation-delay: 0.2s;
}
.cultivation-root .train-tiers {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px;
}
@media (max-width: 480px) {
  .cultivation-root .train-tiers { grid-template-columns: repeat(2, 1fr); }
}
.cultivation-root .tier-btn {
  padding: 12px 8px; border: 1px solid var(--border-glow);
  border-radius: 10px; background: var(--bg-card);
  cursor: pointer; text-align: center; transition: all 0.3s ease;
  font-family: inherit; color: var(--text-secondary);
  position: relative; overflow: hidden;
}
.cultivation-root .tier-btn:hover {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 12px rgba(6,182,212,0.2); transform: translateY(-2px);
}
.cultivation-root .tier-btn:active { transform: translateY(0) scale(0.97); }
.cultivation-root .tier-btn.selected {
  border-color: var(--accent-cyan);
  background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(59,130,246,0.1));
  color: var(--text-primary);
}
.cultivation-root .tier-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.cultivation-root .tier-exp { font-size: 12px; color: var(--accent-cyan); }
.cultivation-root .train-btn {
  width: 100%; padding: 14px; border: 1px solid var(--accent-gold);
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(212,165,116,0.15), rgba(255,215,0,0.08));
  color: var(--accent-gold); font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  text-shadow: 0 0 10px rgba(212,165,116,0.4);
  transition: all 0.3s ease; position: relative; overflow: hidden;
}
.cultivation-root .train-btn:hover { box-shadow: var(--glow-gold); transform: translateY(-1px); }
.cultivation-root .train-btn:active { transform: translateY(1px) scale(0.98); }
.cultivation-root .train-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.cultivation-root .train-btn::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
  animation: btnShimmer 3s ease-in-out infinite;
}
@keyframes btnShimmer { 0% { left: -60%; } 100% { left: 160%; } }
.cultivation-root .gacha-section {
  margin-bottom: 16px; animation: cardEnter 0.6s ease backwards; animation-delay: 0.3s;
}
.cultivation-root .gacha-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; font-size: 14px; color: var(--text-secondary);
}
.cultivation-root .gacha-btns { display: flex; gap: 10px; }
.cultivation-root .gacha-btn {
  flex: 1; padding: 12px; border: 1px solid var(--accent-purple);
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05));
  color: var(--accent-purple); font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.3s ease;
}
.cultivation-root .gacha-btn:hover { box-shadow: var(--glow-purple); transform: translateY(-2px); }
.cultivation-root .gacha-btn:active { transform: translateY(0) scale(0.97); }
.cultivation-root .gacha-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.cultivation-root .gacha-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
  z-index: 10000; display: none; align-items: center; justify-content: center;
}
.cultivation-root .gacha-overlay.show { display: flex; }
.cultivation-root .gacha-result-card {
  background: var(--bg-secondary); border-radius: 16px;
  padding: 30px; text-align: center; max-width: 340px; width: 90%;
  animation: gachaReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 2px solid var(--border-glow);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@keyframes gachaReveal {
  from { opacity: 0; transform: scale(0.5) rotateY(90deg); }
  to { opacity: 1; transform: scale(1) rotateY(0); }
}
.cultivation-root .gacha-result-card .item-quality { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.cultivation-root .gacha-result-card .item-name { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.cultivation-root .gacha-result-card .item-type-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; margin-bottom: 12px;
  background: rgba(168,85,247,0.2); color: var(--accent-purple);
}
.cultivation-root .gacha-result-card .item-effect {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap;
}
.cultivation-root .gacha-close-btn {
  padding: 10px 30px; border: 1px solid var(--accent-gold);
  border-radius: 8px; background: transparent;
  color: var(--accent-gold); font-family: inherit;
  cursor: pointer; font-size: 14px; transition: all 0.3s ease;
}
.cultivation-root .gacha-close-btn:hover {
  background: rgba(212,165,116,0.15); box-shadow: var(--glow-gold);
}
.cultivation-root .tab-bar {
  display: flex; gap: 4px; margin-bottom: 14px;
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 3px;
}
.cultivation-root .tab-item {
  flex: 1; padding: 8px 6px; border: none; border-radius: 6px;
  background: transparent; color: var(--text-dim);
  font-family: inherit; font-size: 13px; cursor: pointer;
  transition: all 0.3s ease; text-align: center;
}
.cultivation-root .tab-item:hover { color: var(--text-secondary); }
.cultivation-root .tab-item.active {
  background: rgba(168,85,247,0.2); color: var(--accent-purple);
}
.cultivation-root .inv-list {
  max-height: 320px; overflow-y: auto; position: relative; z-index: 1;
  scrollbar-width: thin; scrollbar-color: var(--accent-purple) transparent;
}
.cultivation-root .inv-list::-webkit-scrollbar { width: 4px; }
.cultivation-root .inv-list::-webkit-scrollbar-track { background: transparent; }
.cultivation-root .inv-list::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }
.cultivation-root .inv-item {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  border: 1px solid rgba(168,85,247,0.1); border-radius: 8px;
  margin-bottom: 6px; background: rgba(0,0,0,0.2);
  transition: all 0.3s ease; cursor: default;
  animation: itemSlideIn 0.3s ease backwards;
}
@keyframes itemSlideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.cultivation-root .inv-item:hover {
  background: rgba(168,85,247,0.08);
  border-color: rgba(168,85,247,0.25);
  transform: translateX(3px);
}
.cultivation-root .inv-item.selected {
  background: rgba(168,85,247,0.15);
  border-color: rgba(168,85,247,0.4);
  box-shadow: inset 0 0 10px rgba(168,85,247,0.1);
}
.cultivation-root .inv-item .item-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.cultivation-root .inv-item .item-info { flex: 1; min-width: 0; }
.cultivation-root .inv-item .item-info .item-name-line {
  display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap;
}
.cultivation-root .inv-item .item-info .item-name { font-size: 14px; font-weight: 600; }
.cultivation-root .inv-item .item-info .quality-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.cultivation-root .inv-item .item-info .item-effect-text {
  font-size: 12px; color: var(--text-dim);
  white-space: pre-wrap; line-height: 1.4;
}
.cultivation-root .inv-item .item-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
.cultivation-root .item-act-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 12px;
  font-family: inherit; cursor: pointer; transition: all 0.2s ease;
  border: 1px solid; background: transparent;
}
.cultivation-root .item-act-btn.equip-btn { border-color: var(--accent-green); color: var(--accent-green); }
.cultivation-root .item-act-btn.equip-btn:hover { background: rgba(34,197,94,0.15); }
.cultivation-root .item-act-btn.use-btn { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.cultivation-root .item-act-btn.use-btn:hover { background: rgba(6,182,212,0.15); }
.cultivation-root .item-act-btn.unequip-btn { border-color: var(--accent-orange); color: var(--accent-orange); }
.cultivation-root .item-act-btn.unequip-btn:hover { background: rgba(249,115,22,0.15); }
.cultivation-root .item-act-btn.discard-btn { border-color: var(--accent-red); color: var(--accent-red); }
.cultivation-root .item-act-btn.discard-btn:hover { background: rgba(239,68,68,0.15); }
.cultivation-root .item-act-btn.exchange-btn { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.cultivation-root .item-act-btn.exchange-btn:hover { background: rgba(6,182,212,0.15); }
.cultivation-root .item-act-btn:active { transform: scale(0.9); }
.cultivation-root .equipped-section { animation: cardEnter 0.6s ease backwards; animation-delay: 0.4s; }
.cultivation-root .equip-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  position: relative; z-index: 1;
}
@media (max-width: 580px) {
  .cultivation-root .equip-grid { grid-template-columns: repeat(2, 1fr); }
}
.cultivation-root .equip-slot {
  background: rgba(0,0,0,0.3); border: 1px dashed rgba(168,85,247,0.2);
  border-radius: 10px; padding: 12px; text-align: center;
  transition: all 0.3s ease; min-height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.cultivation-root .equip-slot.filled { border-style: solid; border-color: var(--border-glow); }
.cultivation-root .equip-slot:hover { border-color: var(--accent-purple); }
.cultivation-root .equip-slot .slot-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.cultivation-root .equip-slot .slot-name { font-size: 14px; font-weight: 600; }
.cultivation-root .equip-slot .slot-empty { font-size: 13px; color: var(--text-dim); }
.cultivation-root .equipped-skills { margin-top: 12px; position: relative; z-index: 1; }
.cultivation-root .skill-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 20px; font-size: 13px;
  margin: 3px; border: 1px solid var(--border-glow);
  background: rgba(168,85,247,0.1); transition: all 0.3s ease;
}
.cultivation-root .skill-tag:hover { background: rgba(168,85,247,0.2); transform: translateY(-1px); }
.cultivation-root .exp-bar-wrapper { margin: 14px 0; position: relative; z-index: 1; }

  const EFFECT_PARAMS = {

  const WEAPON_NAMES = { prefixes: ["寒铁","玄钢","赤金","陨铁","精钢","白银","墨玉","星辰","龙骨","凤翎","冰晶","天雷"], types: ["剑","刀","枪","棍","鞭","戟","锤","斧","扇"] };

  const ACCS_NAMES = { prefixes: ["明月","星辰","流光","灵犀","琉璃","翡翠","琥珀","珊瑚","暗影","幻梦"], types: ["环","链","佩","簪","带","冠","印","符"] };

  const GONGFA_CORE = ["太虚","混元","九转","天罡","紫微","北斗","先天","鸿蒙","乾坤","万象","璇玑","玄天","无量","大衍","周天","阴阳","五行","造化"];
  const GONGFA_SUFFIX = ["诀","经","功","术","法","典","篇","录","真解","秘要"];
  const GONGFA_PASSIVES = [
    {type:"回合攻击叠加", desc:"每回合攻击力叠加", paramName:"叠加值", isPercent:false, base:2, scale:4},
    {type:"免伤", desc:"受到伤害时减免固定值", paramName:"减免值", isPercent:false, base:3, scale:6},
    {type:"防御力提升", desc:"提高防御力", paramName:"提升(%)", isPercent:true, base:5, scale:10},
    {type:"攻击力提升", desc:"提高攻击力", paramName:"提升(%)", isPercent:true, base:5, scale:10},
    {type:"自动回血", desc:"每回合自动恢复生命", paramName:"恢复量", isPercent:false, base:3, scale:8},
    {type:"叠加印记", desc:"攻击叠加印记满5层引爆造成额外伤害", paramName:"每层伤害", isPercent:false, base:4, scale:6},
    {type:"反伤", desc:"受击时反弹部分伤害", paramName:"反伤(%)", isPercent:true, base:5, scale:12},
    {type:"暴击率", desc:"提高暴击概率", paramName:"暴击率(%)", isPercent:true, base:3, scale:8},
    {type:"行动点回复", desc:"每回合额外回复行动点", paramName:"回复量", isPercent:false, base:1, scale:2}
  ];

  /* ========== 工具函数 ========== */
  function rand(n) { return Math.floor(Math.random() * n); }
  function pick(arr) { return arr[rand(arr.length)]; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function rollQuality() {
    let total = QUALITIES.reduce((s, q) => s + q.weight, 0);
    let r = Math.random() * total;
    for (const q of QUALITIES) { r -= q.weight; if (r <= 0) return q; }
    return QUALITIES[0];
  }
  function getQualityColor(name) {
    const q = QUALITIES.find(q => q.name === name);
    return q ? q.color : "#9e9e9e";
  }
  function getQualityMult(name) {
    const q = QUALITIES.find(q => q.name === name);
    return q ? q.mult : 1;
  }

  /* ========== 物品生成器 ========== */
  function generatePill(quality) {
    const tmpl = pick(PILL_TEMPLATES);
    const name = pick(tmpl.prefix) + pick(PILL_SUFFIXES);
    const isPercent = Math.random() > 0.45;
    const value = isPercent ? Math.floor(quality.mult * (3 + rand(8))) : Math.floor(quality.mult * (2 + rand(6)));
    const effectStr = `${tmpl.attr}${isPercent ? '+' + value + '%' : '+' + value}`;
    return { id: uid(), 类别: "丹药", 名称: name, 品质: quality.name, 效果: effectStr, 数量: 1, _desc: `服用后${tmpl.attr}永久${isPercent ? '提升' + value + '%' : '增加' + value + '点'}` };
  }

  function generateSkill(quality) {
    const targetRoll = Math.random();
    let targetType, name, effects = [];
    if (targetRoll < 0.5) {
      targetType = "单体攻击";
      const groupKey = pick(Object.keys(SKILL_EFFECT_GROUPS));
      const group = SKILL_EFFECT_GROUPS[groupKey];
      name = pick(group.cores) + pick(SKILL_ATTACK_SUFFIX);
      const effectCount = quality.mult >= 3 ? (1 + rand(2)) : (Math.random() > 0.4 ? 1 : 0);
      const usedEffects = new Set();
      for (let i = 0; i < effectCount; i++) {
        const effType = pick(group.effects);
        if (usedEffects.has(effType)) continue; usedEffects.add(effType);
        const ep = EFFECT_PARAMS[effType];
        const val = Math.floor(quality.mult * (ep.base + rand(ep.scale)));
        const prob = Math.min(100, Math.floor(30 + quality.mult * 10 + rand(20)));
        effects.push({ 类型: effType, 描述: ep.paramName === "触发概率(%)" ? `${prob}%概率直接击杀目标` : `命中后使目标${effType}，${ep.paramName}:${val}`, [ep.paramName]: val, "概率(%)": prob });

      const groupKey = pick(Object.keys(SKILL_EFFECT_GROUPS).filter(k => k !== "暗影"));

        const effType = pick(group.effects); const ep = EFFECT_PARAMS[effType];

    } else if (targetRoll < 0.85) {

      targetType = "自身增益"; name = pick(SKILL_BUFF_CORES) + pick(SKILL_BUFF_SUFFIX);

        const ep = EFFECT_PARAMS["增益"]; const val = Math.floor(quality.mult * (ep.base + rand(ep.scale)));
        effects.push({ 类型: "增益", 描述: `提高自身攻击力${val}%`, "提升(%)": val, "概率(%)": 100 });
      } else {
        const ep = EFFECT_PARAMS["反弹"]; const val = Math.floor(quality.mult * (ep.base + rand(ep.scale)));
        effects.push({ 类型: "反弹", 描述: `将受到伤害的${val}%反弹给攻击者`, "反弹比例(%)": val, "概率(%)": 100 });

    const range = targetType.includes("群体") ? (2 + rand(3)) : (targetType === "队友治疗" ? (2 + rand(2)) : (1 + rand(2)));
    const dmgMult = targetType === "队友治疗" ? 0 : parseFloat((quality.mult * (0.8 + Math.random() * 0.8)).toFixed(1));
    const neigongReq = Math.floor(quality.mult * (5 + rand(10)));
    return { id: uid(), 类别: "武功", 名称: name, 品质: quality.name, 类型: targetType, 攻击范围: range, 伤害倍率: dmgMult, 效果: effects, 内功需求: neigongReq };

      const def = Math.floor(quality.mult * (3 + rand(8))); const extras = {};
      if (Math.random() > 0.5) extras["内功"] = Math.floor(quality.mult * (1 + rand(3)));
      return { id: uid(), 类别: "装备", 名称: name, 品质: quality.name, 部位: "防具", 属性加成: { "防御力": def, ...extras } };
    } else {
      const name = pick(ACCS_NAMES.prefixes) + pick(ACCS_NAMES.types);
      const attr = pick(ATTRS); const val = Math.floor(quality.mult * (2 + rand(5)));
      const extras = {}; extras[attr] = val;
      if (Math.random() > 0.5) { const a2 = pick(ATTRS.filter(a => a !== attr)); extras[a2] = Math.floor(quality.mult * (1 + rand(3))); }
      return { id: uid(), 类别: "装备", 名称: name, 品质: quality.name, 部位: "饰品", 属性加成: extras };
    }
  }

  function generateGongfa(quality) {
    const name = pick(GONGFA_CORE) + pick(GONGFA_SUFFIX);
    const expMult = parseFloat((1 + quality.mult * 0.3).toFixed(1));
    const passiveCount = quality.mult >= 3 ? 2 : 1; const passives = []; const usedTypes = new Set();
    for (let i = 0; i < passiveCount; i++) {
      let p; do { p = pick(GONGFA_PASSIVES); } while (usedTypes.has(p.type)); usedTypes.add(p.type);
      const val = Math.floor(quality.mult * (p.base + rand(p.scale)));
      const descStr = p.isPercent ? `${p.desc}${val}%` : `${p.desc}${val}`;
      passives.push({ 类型: p.type, 描述: descStr, [p.paramName]: val });
    }
    return { id: uid(), 类别: "功法", 名称: name, 品质: quality.name, 经验倍率: expMult, 被动效果: passives };
  }

  function generateRandomItem() {
    const quality = rollQuality(); const r = Math.random();
    if (r < 0.30) return generatePill(quality);
    if (r < 0.55) return generateSkill(quality);
    if (r < 0.80) return generateEquipment(quality);
    return generateGongfa(quality);
  }

  /* ========== 物品效果显示格式化 ========== */
  function formatItemEffect(item) {
    if (item["类别"] === "丹药") { return item["_desc"] || item["效果"] || ''; }
    else if (item["类别"] === "武功") {
      let text = `${item["类型"]} | 范围:${item["攻击范围"]}`;
      if (item["伤害倍率"] > 0) text += ` | 倍率:${item["伤害倍率"]}x`;
      text += ` | 内功需求:${item["内功需求"]}`;
      if (item["效果"] && item["效果"].length > 0) {
        text += '\n' + item["效果"].map(e => { let detail = `[${e["类型"]}] ${e["描述"]}`; if (e["概率(%)"] !== undefined && e["概率(%)"] < 100) detail += ` (${e["概率(%)"]}%触发)`; return detail; }).join('\n');
      }
      return text;
    } else if (item["类别"] === "功法") {
      let text = `经验倍率 x${item["经验倍率"]}`;
      if (item["被动效果"] && item["被动效果"].length > 0) {
        text += '\n' + item["被动效果"].map(p => { let detail = `[${p["类型"]}] ${p["描述"]}`; for (const k in p) { if (k !== "类型" && k !== "描述") detail += ` | ${k}:${p[k]}`; } return detail; }).join('\n');
      }
      return text;
    } else if (item["类别"] === "装备") {
      const bonuses = item["属性加成"] || {};
      return `${item["部位"]} | ${Object.entries(bonuses).map(([k,v]) => k + ' +' + v).join(' ')}`;
    }
    return '';
  }

  /* ========== 每日重置 ========== */
  function getCurrentDateStr() {
    if (hasVars && hasLodash) { try { allVars = getAllVariables(); } catch(e) { allVars = {}; } }
    if (!hasVars || !hasLodash) return null;
    const y = Number(_.get(allVars, 'stat_data.世界信息.历法.年', 0));
    const m = Number(_.get(allVars, 'stat_data.世界信息.历法.月', 0));
    const d = Number(_.get(allVars, 'stat_data.世界信息.历法.日', 0));
    if (y === 0 && m === 0 && d === 0) return null;
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  async function checkDailyReset() {
    const today = getCurrentDateStr();
    if (!today) { console.warn("[修炼面板] 无法读取MVU历法日期，跳过每日重置检查。"); return false; }
    const lastDate = attrData["上次操作日期"] || "0-00-00";
    if (today === lastDate) return false;
    console.log(`[修炼面板] 检测到日期变更: ${lastDate} -> ${today}，执行每日重置`);
    attrData["上次操作日期"] = today;
    for (const key of Object.keys(attrData)) {
      if (key === "上次操作日期") continue;
      const ca = attrData[key];
      if (ca && typeof ca === 'object' && !Array.isArray(ca)) { ca["今日已修炼"] = false; ca["今日免费抽奖次数"] = 3; }
    }
    /* 【新增】自动修炼处理 */
    await processAutoTrain();
    await saveAttrData();
    return true;
  }

    const list = getBlockedChars();
    if (!list.includes(name)) { list.push(name); setBlockedChars(list); }

  function deleteChar(name) {
    if (name === "主角") { showToast("无法删除主角", "error"); return; }
    showConfirm('确认删除角色', `确定要从修炼面板中永久删除「${name}」吗？\n\n此操作将：\n· 清除该角色的修炼数据\n· 卸下该角色已装备的物品\n· 从MVU变量中移除该角色\n\n此操作不可撤销。`, async function() {
      /* 清除修炼数据 */
      delete attrData[name];
      /* 清除装备数据 */
      if (invData["已装备"] && invData["已装备"][name]) delete invData["已装备"][name];
      /* 记入已删除列表 */
      const list = getDeletedChars();
      if (!list.includes(name)) { list.push(name); setDeletedChars(list); }
      /* 从屏蔽列表移除（如果有） */
      setBlockedChars(getBlockedChars().filter(c => c !== name));
      /* 切换当前角色 */
      if (currentChar === name) currentChar = "主角";
      await saveAttrData(); await saveInvData();
      /* 尝试从MVU变量删除 */
      if (hasTS) {
        try {
          await triggerSlash(`/echo severity=warning 角色「${name}」已从修炼面板删除。请在MVU变量中手动移除该角色条目（如需彻底清除）。`);
        } catch(e) {}
      }
      renderCharManage(); renderAll();
      showToast(`已删除: ${name}`, "warning");
    });
  }

    catch(e) { return { enabled: false, chars: {} }; }

    config.enabled = enabled;

  function setAutoTrainTier(charName, tierIdx) {
    const config = getAutoTrainConfig();
    if (!config.chars) config.chars = {};
    config.chars[charName] = parseInt(tierIdx);
    setAutoTrainConfig(config);
  }

  async function processAutoTrain() {
    const config = getAutoTrainConfig();
    if (!config.enabled) return;
    const chars = getCharList().filter(c => c !== "主角");
    let trainedCount = 0;
    for (const cName of chars) {
      const ca = attrData[cName];
      if (!ca || ca["今日已修炼"]) continue;
      const tierIdx = (config.chars && config.chars[cName] !== undefined) ? config.chars[cName] : 0;
      const tier = TRAIN_TIERS[tierIdx] || TRAIN_TIERS[0];
      const wuxing = ca["悟性"] || 0;
      const charEquip = invData["已装备"] && invData["已装备"][cName] ? invData["已装备"][cName] : {};
      let gfMult = 1;
      if (charEquip["功法"]) {
        const gfItem = (invData["背包"]||[]).find(i => i.id === charEquip["功法"]);
        if (gfItem && gfItem["经验倍率"]) gfMult = gfItem["经验倍率"];
      }
      const actualExp = Math.floor(tier.exp * (1 + wuxing / 100) * gfMult);
      ca["经验值"] = (ca["经验值"] || 0) + actualExp;
      ca["今日已修炼"] = true;
      trainedCount++;
      console.log(`[自动修炼] ${cName}: ${tier.name} +${actualExp}经验`);
    }
    if (trainedCount > 0) {
      showToast(`托管修炼完成: ${trainedCount}位角色已自动修炼`, "success");
    }
  }

  function renderAutoTrainList() {
    const listDiv = document.getElementById('autoTrainList'); if (!listDiv) return;
    const toggle = document.getElementById('autoTrainToggle');
    const config = getAutoTrainConfig();
    if (toggle) toggle.checked = config.enabled;
    const chars = getCharList().filter(c => c !== "主角");
    if (chars.length === 0) {
      listDiv.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:10px;">暂无其他角色</div>';

    }
    listDiv.innerHTML = '';
    chars.forEach(cName => {
      const selectedTierIdx = (config.chars && config.chars[cName] !== undefined) ? config.chars[cName] : 0;
      const div = document.createElement('div');
      div.className = 'auto-train-item';
      let optionsHtml = TRAIN_TIERS.map((t, i) => `<option value="${i}" ${i === selectedTierIdx ? 'selected' : ''}>${t.name}(+${t.exp})</option>`).join('');
      div.innerHTML = `
        <span class="at-name">${cName}</span>
        <select onchange="CultivationPanel.setAutoTrainTier('${cName}', this.value)" ${!config.enabled ? 'disabled' : ''}>${optionsHtml}</select>`;
      listDiv.appendChild(div);
    });
  }

  function renderRadar() {
    const canvas = document.getElementById('radarCanvas'); if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height, cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 30;
    ctx.clearRect(0, 0, w, h);
    const ca = attrData[currentChar] || {};
    const labels = ["攻击力","防御力","内功","轻功","悟性","经验"];
    const maxVals = [100, 100, 100, 100, 100, 1000];
    const vals = [ca["攻击力"]||0, ca["防御力"]||0, ca["内功"]||0, ca["轻功"]||0, ca["悟性"]||0, ca["经验值"]||0];
    const n = labels.length, step = (Math.PI * 2) / n;
    for (let lvl = 5; lvl >= 1; lvl--) {
      ctx.beginPath();
      for (let i = 0; i < n; i++) { const a = -Math.PI/2 + step*i; const lr = r*lvl/5; const x = cx+lr*Math.cos(a); const y = cy+lr*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
      ctx.closePath(); ctx.strokeStyle = 'rgba(168,85,247,'+(0.1+lvl*0.04)+')'; ctx.lineWidth = 1; ctx.stroke();
    }
    for (let i = 0; i < n; i++) { const a = -Math.PI/2+step*i; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); ctx.strokeStyle='rgba(168,85,247,0.15)'; ctx.stroke(); }
    ctx.beginPath();
    for (let i = 0; i < n; i++) { const a = -Math.PI/2+step*i; const ratio = Math.min(1,vals[i]/maxVals[i]); const x = cx+r*ratio*Math.cos(a); const y = cy+r*ratio*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.closePath(); ctx.fillStyle='rgba(168,85,247,0.2)'; ctx.fill(); ctx.strokeStyle='rgba(168,85,247,0.8)'; ctx.lineWidth=2; ctx.stroke();
    for (let i = 0; i < n; i++) {
      const a = -Math.PI/2+step*i; const ratio = Math.min(1,vals[i]/maxVals[i]);
      const px = cx+r*ratio*Math.cos(a); const py = cy+r*ratio*Math.sin(a);
      ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fillStyle='#a855f7'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
      const lx = cx+(r+20)*Math.cos(a); const ly = cy+(r+20)*Math.sin(a);
      ctx.fillStyle='#a098b8'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(labels[i],lx,ly);
    }
  }

  function renderInventory() {
    const tabBar = document.getElementById('invTabs');
    const listDiv = document.getElementById('invList');
    if (!tabBar || !listDiv) return;
    tabBar.innerHTML = '';
    INV_TABS.forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'tab-item' + (tab === currentInvTab ? ' active' : '');
      btn.textContent = tab;
      btn.onclick = function() { currentInvTab = tab; selectedItemIds.clear(); renderInventory(); };
      tabBar.appendChild(btn);
    });
    const bag = invData["背包"] || [];
    const equippedIds = getEquippedIds();
    const charEquipIds = new Set();
    const charEquip = invData["已装备"] && invData["已装备"][currentChar] ? invData["已装备"][currentChar] : {};
    if (charEquip["功法"]) charEquipIds.add(charEquip["功法"]);
    (charEquip["武功"]||[]).forEach(id => charEquipIds.add(id));
    if (charEquip["装备"]) Object.values(charEquip["装备"]).forEach(id => { if (id) charEquipIds.add(id); });

    let filtered = currentInvTab === "全部" ? bag : bag.filter(item => item["类别"] === currentInvTab);
    if (filtered.length === 0) {
      listDiv.innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:28px;margin-bottom:8px;display:block;"></i>储物袋空空如也</div>';
      updateToolbarCount();
      return;
    }
    listDiv.innerHTML = '';
    filtered.forEach((item, idx) => {
      const qColor = getQualityColor(item["品质"]);
      const isEquippedByCurrentChar = charEquipIds.has(item.id);
      const isEquippedByAny = equippedIds.has(item.id);
      const isSelected = selectedItemIds.has(item.id);
      const exchangeExp = EXCHANGE_EXP[item["品质"]] || 10;

      div.className = 'inv-item' + (isSelected ? ' selected' : '');
      div.style.animationDelay = (idx * 0.03) + 's';

      if (item["类别"] === "武功") iconClass = 'fas fa-hand-fist';
      else if (item["类别"] === "功法") iconClass = 'fas fa-book';
      else if (item["类别"] === "装备") iconClass = 'fas fa-shield-halved';
      else if (item["类别"] === "丹药") iconClass = 'fas fa-flask';
      const effectText = formatItemEffect(item);
      let actionsHtml = '';
      if (isEquippedByCurrentChar) {
        actionsHtml = `<button class="item-act-btn unequip-btn" data-id="${item.id}" data-cat="${item["类别"]}">卸下</button>`;
      } else {
        if (item["类别"] === "丹药") actionsHtml += `<button class="item-act-btn use-btn" data-id="${item.id}">使用</button>`;
        else if (!isEquippedByAny) actionsHtml += `<button class="item-act-btn equip-btn" data-id="${item.id}" data-cat="${item["类别"]}">装备</button>`;
        if (!isEquippedByAny) {
          actionsHtml += `<button class="item-act-btn exchange-btn" data-id="${item.id}" title="兑换为${exchangeExp}经验">兑换</button>`;
          actionsHtml += `<button class="item-act-btn discard-btn" data-id="${item.id}">丢弃</button>`;
        }
      }
      div.innerHTML = `
        ${!isEquippedByAny ? `<input type="checkbox" class="item-checkbox" data-id="${item.id}" ${isSelected ? 'checked' : ''}>` : ''}
        <div class="item-icon" style="background:${qColor}22;border:1px solid ${qColor}55;color:${qColor};"><i class="${iconClass}"></i></div>
        <div class="item-info">
          <div class="item-name-line">
            <span class="quality-dot" style="background:${qColor};box-shadow:0 0 6px ${qColor};"></span>

  async function doTrain() {
    const ca = attrData[currentChar];
    if (!ca) { showToast("角色数据未加载", "error"); return; }
    if (ca["今日已修炼"]) { showToast("今日已完成修炼", "error"); return; }
    const tier = TRAIN_TIERS[selectedTier]; const wuxing = ca["悟性"] || 0;
    const charEquip = invData["已装备"] && invData["已装备"][currentChar] ? invData["已装备"][currentChar] : {};
    let gfMult = 1;
    if (charEquip["功法"]) { const gfItem = (invData["背包"]||[]).find(i => i.id === charEquip["功法"]); if (gfItem && gfItem["经验倍率"]) gfMult = gfItem["经验倍率"]; }
    const actualExp = Math.floor(tier.exp * (1 + wuxing / 100) * gfMult);
    ca["经验值"] = (ca["经验值"] || 0) + actualExp; ca["今日已修炼"] = true;
    await saveAttrData(); renderAll();
    showToast(`${tier.name}完成! 获得 ${actualExp} 经验`, "success");
  }

  async function doGacha(count) {
    const ca = attrData[currentChar];
    if (!ca) { showToast("角色数据未加载", "error"); return; }
    const freeCount = ca["今日免费抽奖次数"] || 0;
    let freePulls = Math.min(count, freeCount); let paidPulls = count - freePulls;
    const cost = paidPulls * 50;
    if (cost > 0 && (ca["经验值"] || 0) < cost) { showToast(`经验不足! 需要 ${cost} 经验`, "error"); return; }
    ca["今日免费抽奖次数"] = freeCount - freePulls;
    if (cost > 0) ca["经验值"] -= cost;
    const results = [];
    for (let i = 0; i < count; i++) {
      const item = generateRandomItem();
      if (item["类别"] === "丹药") {
        const existing = (invData["背包"]||[]).find(bi => bi["类别"]==="丹药" && bi["名称"]===item["名称"] && bi["品质"]===item["品质"] && bi["效果"]===item["效果"]);
        if (existing) existing["数量"] = (existing["数量"]||1)+1;
        else invData["背包"].push(item);
      } else invData["背包"].push(item);
      results.push(item);
    }
    await saveAttrData(); await saveInvData(); renderAll();
    if (results.length === 1) showGachaResult(results[0]);
    else showGachaResults(results);
  }

  async function equipItem(itemId, category) {
    if (!invData["已装备"]) invData["已装备"] = {};
    if (!invData["已装备"][currentChar]) invData["已装备"][currentChar] = { "武功":[], "装备":{"武器":null,"防具":null,"饰品":null}, "功法":null };
    const charEquip = invData["已装备"][currentChar]; const bag = invData["背包"] || [];
    const item = bag.find(i => i.id === itemId);
    if (!item) { showToast("物品未找到", "error"); return; }
    if (category === "武功") {
      const ca = attrData[currentChar] || {};
      if (item["内功需求"] && (ca["内功"]||0) < item["内功需求"]) { showToast(`内功不足! 需要 ${item["内功需求"]}`, "error"); return; }
      if (!charEquip["武功"]) charEquip["武功"] = [];
      if (charEquip["武功"].length >= 4) { showToast("武功栏已满(上限4)", "error"); return; }
      if (charEquip["武功"].includes(itemId)) { showToast("已装备该武功", "error"); return; }
      charEquip["武功"].push(itemId);
    } else if (category === "功法") { charEquip["功法"] = itemId; }
    else if (category === "装备") {
      const slot = item["部位"];
      if (!charEquip["装备"]) charEquip["装备"] = {"武器":null,"防具":null,"饰品":null};
      const oldId = charEquip["装备"][slot];
      if (oldId) { const oldItem = bag.find(i => i.id === oldId); if (oldItem && oldItem["属性加成"]) { const ca = attrData[currentChar]||{}; for (const [k,v] of Object.entries(oldItem["属性加成"])) { if (ca[k] !== undefined) ca[k] = Math.max(0,(ca[k]||0)-v); } } }
      charEquip["装备"][slot] = itemId;
      if (item["属性加成"]) { const ca = attrData[currentChar]||{}; for (const [k,v] of Object.entries(item["属性加成"])) { if (ca[k] !== undefined) ca[k] = (ca[k]||0)+v; } }
      await saveAttrData();
    }
    await saveInvData(); await updateSummary(); renderAll();
    showToast(`已装备: ${item["名称"]}`, "success");
  }

  async function unequipItem(itemId, category) {
    const charEquip = invData["已装备"]&&invData["已装备"][currentChar]?invData["已装备"][currentChar]:{};
    const bag = invData["背包"]||[]; const item = bag.find(i => i.id === itemId);
    if (category === "武功") charEquip["武功"] = (charEquip["武功"]||[]).filter(id => id !== itemId);
    else if (category === "功法") { if (charEquip["功法"] === itemId) charEquip["功法"] = null; }
    else if (category === "装备") {
      if (item && item["部位"] && charEquip["装备"]) {
        if (charEquip["装备"][item["部位"]] === itemId) {
          charEquip["装备"][item["部位"]] = null;
          if (item["属性加成"]) { const ca = attrData[currentChar]||{}; for (const [k,v] of Object.entries(item["属性加成"])) { if (ca[k] !== undefined) ca[k] = Math.max(0,(ca[k]||0)-v); } await saveAttrData(); }
        }
      }
    }
    await saveInvData(); await updateSummary(); renderAll();
    showToast(`已卸下: ${item ? item["名称"] : "物品"}`, "info");
  }

  async function useItem(itemId) {
    const bag = invData["背包"]||[]; const idx = bag.findIndex(i => i.id === itemId);
    if (idx === -1) { showToast("物品未找到", "error"); return; }
    const item = bag[idx];
    if (item["类别"] !== "丹药") { showToast("该物品无法直接使用", "error"); return; }
    const effectStr = item["效果"] || ''; const ca = attrData[currentChar];
    if (!ca) { showToast("角色数据未加载", "error"); return; }
    const match = effectStr.match(/^(\S+?)([+-])(\d+)(%?)$/);
    if (match) {
      const attr = match[1], sign = match[2]==='+'?1:-1, val = parseInt(match[3]), isPercent = match[4]==='%';
      if (ca[attr] !== undefined) {
        if (isPercent) ca[attr] = Math.floor(ca[attr] * (1 + sign * val / 100));
        else ca[attr] = Math.max(0, ca[attr] + sign * val);
      }
    }
    if (item["数量"] && item["数量"] > 1) item["数量"]--;
    else bag.splice(idx, 1);
    await saveAttrData(); await saveInvData(); renderAll();
    showToast(`使用了 ${item["名称"]}: ${effectStr}`, "success");
  }

  function batchDiscard() {
    if (selectedItemIds.size === 0) { showToast("请先选择物品", "error"); return; }

    const items = [...selectedItemIds].map(id => bag.find(i => i.id === id)).filter(Boolean);

    showConfirm('批量丢弃', `确定要丢弃以下 ${items.length} 件物品吗？\n${nameList}\n\n此操作不可撤销。`, async function() {
      for (const itemId of [...selectedItemIds]) {

  async function importItems() {
    const input = document.getElementById('forgeImportInput'); if (!input) return;
    const raw = input.value.trim();
    if (!raw) { showToast("请粘贴物品JSON数据", "error"); return; }
    try {
      let items = JSON.parse(raw); if (!Array.isArray(items)) items = [items];
      let count = 0;
      for (const item of items) {
        if (!item["类别"] || !item["名称"] || !item["品质"]) { showToast(`物品 "${item["名称"]||'未知'}" 缺少必要字段`, "error"); continue; }
        if (!item.id) item.id = "import_" + uid();
        if (item["类别"] === "丹药") {
          const existing = (invData["背包"]||[]).find(bi => bi["类别"]==="丹药" && bi["名称"]===item["名称"] && bi["品质"]===item["品质"] && bi["效果"]===item["效果"]);
          if (existing) existing["数量"] = (existing["数量"]||1) + (item["数量"]||1);
          else invData["背包"].push(item);
        } else invData["背包"].push(item);
        count++;
      }
      if (count > 0) { await saveInvData(); renderAll(); input.value = ''; showToast(`成功导入 ${count} 件物品`, "success"); }
    } catch(e) { showToast("JSON解析失败: " + e.message, "error"); }
  }

        div.innerHTML = `

            catch(e) { const importInput = document.getElementById('forgeImportInput'); const importAreaEl = document.getElementById('forgeImportArea'); if (importInput) importInput.value = jsonStr; if (importAreaEl) importAreaEl.classList.add('show'); showToast("已填入导入框", "info"); }

              if (existing) existing["数量"] = (existing["数量"]||1) + (newItem["数量"]||1);

    if (wasReset) {
      const banner = document.getElementById('resetBanner');
      if (banner) { banner.innerHTML = '<div class="reset-banner"><i class="fas fa-sun"></i> 新的一天！修炼次数和免费抽奖已重置</div>'; setTimeout(() => { banner.innerHTML = ''; }, 6000); }
      showToast("每日限制已重置", "success");
    }
    applyFoldPreference();
    renderAll();
  }

  init();

  return {
    doTrain, doGacha, closeGacha, doForge, toggleImport, clearImport, importItems, loadRecipes, renderAll,
    toggleDefaultFold, toggleSelectAll, batchDiscard, batchExchange, closeConfirm,
    /* 【新增】暴露的函数 */
    openCharManage, closeCharManage, blockChar, unblockChar, deleteChar,
    toggleAutoTrain, setAutoTrainTier,
    openWorkshop, closeWorkshop, wsRandomName, wsSetQuality, wsTogglePassive, wsSetPassiveParam, wsSetExpMult, wsSetName, wsCreate
  };
})();
</script>
