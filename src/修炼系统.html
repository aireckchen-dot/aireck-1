<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修炼面板</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<style>
.cultivation-root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #111128;
  --bg-card: rgba(20, 20, 50, 0.85);
  --bg-card-hover: rgba(30, 30, 70, 0.95);
  --border-glow: rgba(180, 140, 255, 0.3);
  --border-glow-hover: rgba(200, 160, 255, 0.6);
  --text-primary: #e8e0f0;
  --text-secondary: #a098b8;
  --text-dim: #706888;
  --accent-gold: #d4a574;
  --accent-purple: #a855f7;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-orange: #f97316;
  --glow-gold: 0 0 10px rgba(212,165,116,0.5), 0 0 20px rgba(212,165,116,0.3);
  --glow-purple: 0 0 10px rgba(168,85,247,0.5), 0 0 20px rgba(168,85,247,0.3);
  font-family: 'Noto Serif SC', 'Source Han Serif CN', 'SimSun', serif;
  color: var(--text-primary);
  max-width: 900px;
  margin: 10px auto;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border-glow);
  box-shadow: 0 0 40px rgba(168,85,247,0.15), inset 0 0 60px rgba(10,10,26,0.8);
}
.cultivation-root .dynamic-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.cultivation-root .bg-orb {
  position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15;
  animation: orbFloat 20s infinite ease-in-out;
}
.cultivation-root .bg-orb:nth-child(1) { width: 300px; height: 300px; background: var(--accent-purple); top: -50px; left: -50px; animation-duration: 22s; }
.cultivation-root .bg-orb:nth-child(2) { width: 250px; height: 250px; background: var(--accent-blue); bottom: -30px; right: -30px; animation-duration: 18s; animation-delay: -6s; }
.cultivation-root .bg-orb:nth-child(3) { width: 200px; height: 200px; background: var(--accent-gold); top: 40%; left: 50%; animation-duration: 25s; animation-delay: -12s; }
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.1); }
  50% { transform: translate(-20px, 30px) scale(0.9); }
  75% { transform: translate(15px, 15px) scale(1.05); }
}
.cultivation-root .particle {
  position: absolute; width: 2px; height: 2px; background: var(--accent-gold);
  border-radius: 50%; opacity: 0; pointer-events: none;
  animation: particleRise 8s infinite linear;
}
@keyframes particleRise {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-400px) scale(0); }
}
.cultivation-root .panel-content { position: relative; z-index: 1; padding: 20px; }
.cultivation-root .panel-title {
  text-align: center; font-size: 28px; font-weight: 700;
  margin-bottom: 24px; position: relative;
  background: linear-gradient(135deg, var(--accent-gold), #ffd700, var(--accent-gold));
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmerText 3s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(212,165,116,0.4));
}
@keyframes shimmerText { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.cultivation-root .panel-title::after {
  content: ''; display: block; width: 120px; height: 2px; margin: 10px auto 0;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  animation: lineGlow 2s ease-in-out infinite;
}
@keyframes lineGlow { 0%, 100% { opacity: 0.5; width: 80px; } 50% { opacity: 1; width: 160px; } }
.cultivation-root .panel-details { margin: 0; border: none; }
.cultivation-root .panel-summary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 20px; cursor: pointer; list-style: none;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
  border: 1px solid var(--border-glow); border-radius: 12px; font-size: 18px; font-weight: 600;
  color: var(--accent-gold); text-shadow: 0 0 10px rgba(212,165,116,0.3); transition: all 0.3s ease;
}
.cultivation-root .panel-summary::-webkit-details-marker { display: none; }
.cultivation-root .panel-summary:hover { border-color: var(--border-glow-hover); box-shadow: var(--glow-gold); }
.cultivation-root .panel-summary .toggle-arrow { transition: transform 0.3s ease; font-size: 14px; }
.cultivation-root .panel-details[open] .toggle-arrow { transform: rotate(180deg); }
.cultivation-root .fold-settings-btn {
  margin-left: auto; padding: 4px 10px; border: 1px solid rgba(168,85,247,0.3);
  border-radius: 6px; background: rgba(168,85,247,0.1); color: var(--text-dim);
  font-size: 13px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 4px;
}
.cultivation-root .fold-settings-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); background: rgba(168,85,247,0.2); }
.cultivation-root .fold-settings-btn.is-folded { color: var(--accent-cyan); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.1); }
.cultivation-root .char-select-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center; animation: fadeSlideIn 0.6s ease;
}
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.cultivation-root .char-btn {
  padding: 8px 18px; border: 1px solid var(--border-glow); border-radius: 8px; background: var(--bg-card);
  color: var(--text-secondary); cursor: pointer; font-size: 14px; font-family: inherit;
  transition: all 0.3s ease; position: relative; overflow: hidden;
}
.cultivation-root .char-btn::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.15), transparent); transition: left 0.5s ease;
}
.cultivation-root .char-btn:hover::before { left: 100%; }
.cultivation-root .char-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); box-shadow: var(--glow-purple); }
.cultivation-root .char-btn.active {
  background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(59,130,246,0.15));
  border-color: var(--accent-purple); color: var(--accent-gold); box-shadow: var(--glow-purple);
}
.cultivation-root .char-btn:active { transform: scale(0.95); }
.cultivation-root .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 680px) { .cultivation-root .main-grid { grid-template-columns: 1fr; } }
.cultivation-root .card {
  background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 12px; padding: 16px;
  position: relative; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s ease; overflow: hidden; animation: cardEnter 0.5s ease backwards;
}
@keyframes cardEnter { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.cultivation-root .card:hover { border-color: var(--border-glow-hover); box-shadow: 0 4px 20px rgba(168,85,247,0.1); }
.cultivation-root .card-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--accent-gold);
  display: flex; align-items: center; gap: 8px; text-shadow: 0 0 8px rgba(212,165,116,0.3);
}
.cultivation-root .card-title i { font-size: 14px; }
.cultivation-root .card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px;
  background: linear-gradient(45deg, transparent 40%, rgba(168,85,247,0.1) 50%, transparent 60%);
  background-size: 300% 300%; opacity: 0; animation: borderShimmer 4s ease-in-out infinite;
  pointer-events: none; z-index: 0;
}
.cultivation-root .card:hover::before { opacity: 1; }
@keyframes borderShimmer { 0% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }
.cultivation-root .attr-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(168,85,247,0.1); position: relative; z-index: 1;
}
.cultivation-root .attr-row:last-child { border-bottom: none; }
.cultivation-root .attr-label { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 14px; }
.cultivation-root .attr-value { font-size: 16px; font-weight: 600; color: var(--text-primary); transition: all 0.3s ease; }
.cultivation-root .attr-value.highlight { color: var(--accent-gold); text-shadow: 0 0 8px rgba(212,165,116,0.4); }
.cultivation-root .tooltip-trigger { position: relative; cursor: help; color: var(--text-dim); font-size: 12px; }
.cultivation-root .tooltip-bubble {
  position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: var(--bg-secondary);
  border: 1px solid var(--accent-purple); border-radius: 8px; padding: 8px 12px; font-size: 12px;
  color: var(--text-primary); white-space: nowrap; opacity: 0; visibility: hidden; pointer-events: none;
  transition: all 0.2s ease; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
.cultivation-root .tooltip-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--accent-purple); }
.cultivation-root .tooltip-trigger:hover .tooltip-bubble { opacity: 1; visibility: visible; }
.cultivation-root .radar-container { display: flex; justify-content: center; align-items: center; padding: 10px 0; position: relative; z-index: 1; }
.cultivation-root .radar-container canvas { max-width: 100%; height: auto; }
.cultivation-root .train-section { margin-bottom: 16px; animation: cardEnter 0.6s ease backwards; animation-delay: 0.2s; }
.cultivation-root .train-tiers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
@media (max-width: 480px) { .cultivation-root .train-tiers { grid-template-columns: repeat(2, 1fr); } }
.cultivation-root .tier-btn {
  padding: 12px 8px; border: 1px solid var(--border-glow); border-radius: 10px; background: var(--bg-card);
  cursor: pointer; text-align: center; transition: all 0.3s ease; font-family: inherit; color: var(--text-secondary);
  position: relative; overflow: hidden;
}
.cultivation-root .tier-btn:hover { border-color: var(--accent-cyan); box-shadow: 0 0 12px rgba(6,182,212,0.2); transform: translateY(-2px); }
.cultivation-root .tier-btn:active { transform: translateY(0) scale(0.97); }
.cultivation-root .tier-btn.selected { border-color: var(--accent-cyan); background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(59,130,246,0.1)); color: var(--text-primary); }
.cultivation-root .tier-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.cultivation-root .tier-exp { font-size: 12px; color: var(--accent-cyan); }
.cultivation-root .train-btn {
  width: 100%; padding: 14px; border: 1px solid var(--accent-gold); border-radius: 10px;
  background: linear-gradient(135deg, rgba(212,165,116,0.15), rgba(255,215,0,0.08));
  color: var(--accent-gold); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
  text-shadow: 0 0 10px rgba(212,165,116,0.4); transition: all 0.3s ease; position: relative; overflow: hidden;
}
.cultivation-root .train-btn:hover { box-shadow: var(--glow-gold); transform: translateY(-1px); }
.cultivation-root .train-btn:active { transform: translateY(1px) scale(0.98); }
.cultivation-root .train-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.cultivation-root .train-btn::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent); animation: btnShimmer 3s ease-in-out infinite;
}
@keyframes btnShimmer { 0% { left: -60%; } 100% { left: 160%; } }
.cultivation-root .gacha-section { margin-bottom: 16px; animation: cardEnter 0.6s ease backwards; animation-delay: 0.3s; }
.cultivation-root .gacha-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 14px; color: var(--text-secondary); }
.cultivation-root .gacha-btns { display: flex; gap: 10px; }
.cultivation-root .gacha-btn {
  flex: 1; padding: 12px; border: 1px solid var(--accent-purple); border-radius: 10px;
  background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05));
  color: var(--accent-purple); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.3s ease;
}
.cultivation-root .gacha-btn:hover { box-shadow: var(--glow-purple); transform: translateY(-2px); }
.cultivation-root .gacha-btn:active { transform: translateY(0) scale(0.97); }
.cultivation-root .gacha-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.cultivation-root .gacha-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
  z-index: 10000; display: none; align-items: center; justify-content: center;
}
.cultivation-root .gacha-overlay.show { display: flex; }
.cultivation-root .gacha-result-card {
  background: var(--bg-secondary); border-radius: 16px; padding: 30px; text-align: center;
  max-width: 340px; width: 90%; animation: gachaReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 2px solid var(--border-glow); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@keyframes gachaReveal { from { opacity: 0; transform: scale(0.5) rotateY(90deg); } to { opacity: 1; transform: scale(1) rotateY(0); } }
.cultivation-root .gacha-result-card .item-quality { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.cultivation-root .gacha-result-card .item-name { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.cultivation-root .gacha-result-card .item-type-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 12px; background: rgba(168,85,247,0.2); color: var(--accent-purple); }
.cultivation-root .gacha-result-card .item-effect { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap; }
.cultivation-root .gacha-close-btn { padding: 10px 30px; border: 1px solid var(--accent-gold); border-radius: 8px; background: transparent; color: var(--accent-gold); font-family: inherit; cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
.cultivation-root .gacha-close-btn:hover { background: rgba(212,165,116,0.15); box-shadow: var(--glow-gold); }
.cultivation-root .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 3px; }
.cultivation-root .tab-item { flex: 1; padding: 8px 6px; border: none; border-radius: 6px; background: transparent; color: var(--text-dim); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
.cultivation-root .tab-item:hover { color: var(--text-secondary); }
.cultivation-root .tab-item.active { background: rgba(168,85,247,0.2); color: var(--accent-purple); }
.cultivation-root .inv-list { max-height: 320px; overflow-y: auto; position: relative; z-index: 1; scrollbar-width: thin; scrollbar-color: var(--accent-purple) transparent; }
.cultivation-root .inv-list::-webkit-scrollbar { width: 4px; }
.cultivation-root .inv-list::-webkit-scrollbar-track { background: transparent; }
.cultivation-root .inv-list::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }
.cultivation-root .inv-item {
  display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid rgba(168,85,247,0.1);
  border-radius: 8px; margin-bottom: 6px; background: rgba(0,0,0,0.2); transition: all 0.3s ease;
  cursor: default; animation: itemSlideIn 0.3s ease backwards;
}
@keyframes itemSlideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
.cultivation-root .inv-item:hover { background: rgba(168,85,247,0.08); border-color: rgba(168,85,247,0.25); transform: translateX(3px); }
.cultivation-root .inv-item.selected { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); box-shadow: inset 0 0 10px rgba(168,85,247,0.1); }
.cultivation-root .inv-item .item-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.cultivation-root .inv-item .item-info { flex: 1; min-width: 0; }
.cultivation-root .inv-item .item-info .item-name-line { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
.cultivation-root .inv-item .item-info .item-name { font-size: 14px; font-weight: 600; }
.cultivation-root .inv-item .item-info .quality-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cultivation-root .inv-item .item-info .item-effect-text { font-size: 12px; color: var(--text-dim); white-space: pre-wrap; line-height: 1.4; }
.cultivation-root .inv-item .item-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
.cultivation-root .item-act-btn { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.2s ease; border: 1px solid; background: transparent; }
.cultivation-root .item-act-btn.equip-btn { border-color: var(--accent-green); color: var(--accent-green); }
.cultivation-root .item-act-btn.equip-btn:hover { background: rgba(34,197,94,0.15); }
.cultivation-root .item-act-btn.use-btn { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.cultivation-root .item-act-btn.use-btn:hover { background: rgba(6,182,212,0.15); }
.cultivation-root .item-act-btn.unequip-btn { border-color: var(--accent-orange); color: var(--accent-orange); }
.cultivation-root .item-act-btn.unequip-btn:hover { background: rgba(249,115,22,0.15); }
.cultivation-root .item-act-btn.discard-btn { border-color: var(--accent-red); color: var(--accent-red); }
.cultivation-root .item-act-btn.discard-btn:hover { background: rgba(239,68,68,0.15); }
.cultivation-root .item-act-btn.exchange-btn { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.cultivation-root .item-act-btn.exchange-btn:hover { background: rgba(6,182,212,0.15); }
.cultivation-root .item-act-btn:active { transform: scale(0.9); }
.cultivation-root .equipped-section { animation: cardEnter 0.6s ease backwards; animation-delay: 0.4s; }
.cultivation-root .equip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: relative; z-index: 1; }
@media (max-width: 580px) { .cultivation-root .equip-grid { grid-template-columns: repeat(2, 1fr); } }
.cultivation-root .equip-slot {
  background: rgba(0,0,0,0.3); border: 1px dashed rgba(168,85,247,0.2); border-radius: 10px; padding: 12px;
  text-align: center; transition: all 0.3s ease; min-height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.cultivation-root .equip-slot.filled { border-style: solid; border-color: var(--border-glow); }
.cultivation-root .equip-slot:hover { border-color: var(--accent-purple); }
.cultivation-root .equip-slot .slot-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.cultivation-root .equip-slot .slot-name { font-size: 14px; font-weight: 600; }
.cultivation-root .equip-slot .slot-empty { font-size: 13px; color: var(--text-dim); }
.cultivation-root .equipped-skills { margin-top: 12px; position: relative; z-index: 1; }
.cultivation-root .skill-tag { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 20px; font-size: 13px; margin: 3px; border: 1px solid var(--border-glow); background: rgba(168,85,247,0.1); transition: all 0.3s ease; }
.cultivation-root .skill-tag:hover { background: rgba(168,85,247,0.2); transform: translateY(-1px); }
.cultivation-root .exp-bar-wrapper { margin: 14px 0; position: relative; z-index: 1; }
.cultivation-root .exp-bar-bg { height: 20px; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid rgba(168,85,247,0.2); }
.cultivation-root .exp-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; min-width: 0; }
.cultivation-root .exp-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: expShimmer 2s ease-in-out infinite; }
@keyframes expShimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.cultivation-root .exp-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-primary); text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
.cultivation-root .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10001; display: flex; flex-direction: column; gap: 8px; }
.cultivation-root .toast { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-family: inherit; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; box-shadow: 0 4px 20px rgba(0,0,0,0.4); max-width: 300px; }
@keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

  /* ========== 工具函数 ========== */
  function rand(n) { return Math.floor(Math.random() * n); }
  function pick(arr) { return arr[rand(arr.length)]; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function rollQuality() { let total = QUALITIES.reduce((s,q)=>s+q.weight,0), r = Math.random()*total; for (const q of QUALITIES) { r -= q.weight; if (r <= 0) return q; } return QUALITIES[0]; }
  function getQualityColor(name) { const q = QUALITIES.find(q=>q.name===name); return q ? q.color : "#9e9e9e"; }
  function getQualityMult(name) { const q = QUALITIES.find(q=>q.name===name); return q ? q.mult : 1; }

  /* ========== 物品生成器（保持不变） ========== */
  function generatePill(quality) { const tmpl=pick(PILL_TEMPLATES),name=pick(tmpl.prefix)+pick(PILL_SUFFIXES),isPercent=Math.random()>0.45,value=isPercent?Math.floor(quality.mult*(3+rand(8))):Math.floor(quality.mult*(2+rand(6))),effectStr=`${tmpl.attr}${isPercent?'+'+value+'%':'+'+value}`; return {id:uid(),类别:"丹药",名称:name,品质:quality.name,效果:effectStr,数量:1,_desc:`服用后${tmpl.attr}永久${isPercent?'提升'+value+'%':'增加'+value+'点'}`}; }
  function generateSkill(quality) { const targetRoll=Math.random(); let targetType,name,effects=[]; if(targetRoll<0.5){targetType="单体攻击";const gk=pick(Object.keys(SKILL_EFFECT_GROUPS)),g=SKILL_EFFECT_GROUPS[gk];name=pick(g.cores)+pick(SKILL_ATTACK_SUFFIX);const ec=quality.mult>=3?(1+rand(2)):(Math.random()>0.4?1:0),ue=new Set();for(let i=0;i<ec;i++){const et=pick(g.effects);if(ue.has(et))continue;ue.add(et);const ep=EFFECT_PARAMS[et],val=Math.floor(quality.mult*(ep.base+rand(ep.scale))),prob=Math.min(100,Math.floor(30+quality.mult*10+rand(20)));effects.push({类型:et,描述:ep.paramName==="触发概率(%)"?`${prob}%概率直接击杀目标`:`命中后使目标${et}，${ep.paramName}:${val}`,[ep.paramName]:val,"概率(%)":prob});}}else if(targetRoll<0.7){targetType="群体攻击";const gk=pick(Object.keys(SKILL_EFFECT_GROUPS).filter(k=>k!=="暗影")),g=SKILL_EFFECT_GROUPS[gk];name=pick(g.cores)+pick(SKILL_ATTACK_SUFFIX);if(quality.mult>=2&&Math.random()>0.4){const et=pick(g.effects),ep=EFFECT_PARAMS[et],val=Math.floor(quality.mult*(ep.base+rand(ep.scale))*0.7);effects.push({类型:et,描述:`范围${et}，${ep.paramName}:${val}`,[ep.paramName]:val,"概率(%)":Math.min(80,Math.floor(20+quality.mult*8))});}}else if(targetRoll<0.85){targetType="队友治疗";name=pick(SKILL_HEAL_CORES)+pick(SKILL_HEAL_SUFFIX);const ep=EFFECT_PARAMS["治疗"],val=Math.floor(quality.mult*(ep.base+rand(ep.scale)));effects.push({类型:"治疗",描述:`以内力为队友恢复生命，恢复量:${val}`,恢复量:val,"概率(%)":100});}else{targetType="自身增益";name=pick(SKILL_BUFF_CORES)+pick(SKILL_BUFF_SUFFIX);if(Math.random()<0.6){const ep=EFFECT_PARAMS["增益"],val=Math.floor(quality.mult*(ep.base+rand(ep.scale)));effects.push({类型:"增益",描述:`提高自身攻击力${val}%`,"提升(%)":val,"概率(%)":100});}else{const ep=EFFECT_PARAMS["反弹"],val=Math.floor(quality.mult*(ep.base+rand(ep.scale)));effects.push({类型:"反弹",描述:`将受到伤害的${val}%反弹给攻击者`,"反弹比例(%)":val,"概率(%)":100});}} const range=targetType.includes("群体")?(2+rand(3)):(targetType==="队友治疗"?(2+rand(2)):(1+rand(2))),dmgMult=targetType==="队友治疗"?0:parseFloat((quality.mult*(0.8+Math.random()*0.8)).toFixed(1)),neigongReq=Math.floor(quality.mult*(5+rand(10))); return {id:uid(),类别:"武功",名称:name,品质:quality.name,类型:targetType,攻击范围:range,伤害倍率:dmgMult,效果:effects,内功需求:neigongReq}; }
  function generateEquipment(quality) { const r=Math.random(); if(r<0.35){const name=pick(WEAPON_NAMES.prefixes)+pick(WEAPON_NAMES.types),atk=Math.floor(quality.mult*(3+rand(8))),extras={};if(Math.random()>0.5)extras["内功"]=Math.floor(quality.mult*(1+rand(4)));if(Math.random()>0.6)extras["悟性"]=Math.floor(quality.mult*(1+rand(3)));return{id:uid(),类别:"装备",名称:name,品质:quality.name,部位:"武器",属性加成:{"攻击力":atk,...extras}};}else if(r<0.7){const name=pick(ARMOR_NAMES.prefixes)+pick(ARMOR_NAMES.types),def=Math.floor(quality.mult*(3+rand(8))),extras={};if(Math.random()>0.5)extras["内功"]=Math.floor(quality.mult*(1+rand(3)));return{id:uid(),类别:"装备",名称:name,品质:quality.name,部位:"防具",属性加成:{"防御力":def,...extras}};}else{const name=pick(ACCS_NAMES.prefixes)+pick(ACCS_NAMES.types),attr=pick(ATTRS),val=Math.floor(quality.mult*(2+rand(5))),extras={};extras[attr]=val;if(Math.random()>0.5){const a2=pick(ATTRS.filter(a=>a!==attr));extras[a2]=Math.floor(quality.mult*(1+rand(3)));}return{id:uid(),类别:"装备",名称:name,品质:quality.name,部位:"饰品",属性加成:extras};} }

  async function loadInvData(){if(!hasTS)return;try{const raw=await triggerSlash(`/getentryfield file="${WI_FILE}" field=content ${INVENTORY_UID}`);if(raw&&raw.trim()&&raw.trim()!=='null')invData=JSON.parse(raw);}catch(e){console.error("加载物品失败:",e);showToast("物品仓库加载失败","error");}}

  async function updateSummary(){if(!hasTS)return;try{const bagItems=invData["背包"]||[];let summary=`[角色战斗能力概要]\n`;for(const cName of Object.keys(attrData)){if(cName==="上次操作日期")continue;const ca=attrData[cName],ce=invData["已装备"]&&invData["已装备"][cName]?invData["已装备"][cName]:{};summary+=`\n--- ${cName} ---\n`;summary+=`攻:${ca["攻击力"]||0} 防:${ca["防御力"]||0} 内功:${ca["内功"]||0} 轻功:${ca["轻功"]||0} 悟性:${ca["悟性"]||0}\n`;if(ce["功法"]){const gf=bagItems.find(i=>i.id===ce["功法"]);if(gf)summary+=`功法:${gf["名称"]}(${gf["品质"]})\n`;}if(ce["武功"]&&ce["武功"].length>0){summary+=`武功:${ce["武功"].map(id=>{const s=bagItems.find(i=>i.id===id);return s?s["名称"]:"?";}).join(",")}\n`;}for(const part of["武器","防具","饰品"]){if(ce["装备"]&&ce["装备"][part]){const eq=bagItems.find(i=>i.id===ce["装备"][part]);if(eq)summary+=`${part}:${eq["名称"]}(${eq["品质"]})\n`;}}if(ca["特殊技能"]&&ca["特殊技能"].length>0)summary+=`特殊技能:${ca["特殊技能"].join(",")}\n`;}await triggerSlash(`/setentryfield file="${WI_FILE}" uid=${SUMMARY_UID} field=content ${summary}`);}catch(e){console.error("更新概要失败:",e);}}

  /* ========== 每日重置 ========== */
  function getCurrentDateStr(){if(hasVars&&hasLodash){try{allVars=getAllVariables();}catch(e){allVars={};}}if(!hasVars||!hasLodash)return null;const y=Number(_.get(allVars,'stat_data.世界信息.历法.年',0)),m=Number(_.get(allVars,'stat_data.世界信息.历法.月',0)),d=Number(_.get(allVars,'stat_data.世界信息.历法.日',0));if(y===0&&m===0&&d===0)return null;return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  async function checkDailyReset(){const today=getCurrentDateStr();if(!today)return false;const lastDate=attrData["上次操作日期"]||"0-00-00";if(today===lastDate)return false;attrData["上次操作日期"]=today;for(const key of Object.keys(attrData)){if(key==="上次操作日期")continue;const ca=attrData[key];if(ca&&typeof ca==='object'&&!Array.isArray(ca)){ca["今日已修炼"]=false;ca["今日免费抽奖次数"]=3;}}await processAutoTrain();await saveAttrData();return true;}

  /* ========== 角色列表 ========== */
  const BLOCKED_KEY='cultivation_blocked_chars',DELETED_KEY='cultivation_deleted_chars';
  function getBlockedChars(){try{return JSON.parse(localStorage.getItem(BLOCKED_KEY)||'[]');}catch(e){return[];}}
  function setBlockedChars(l){try{localStorage.setItem(BLOCKED_KEY,JSON.stringify(l));}catch(e){}}
  function getDeletedChars(){try{return JSON.parse(localStorage.getItem(DELETED_KEY)||'[]');}catch(e){return[];}}
  function setDeletedChars(l){try{localStorage.setItem(DELETED_KEY,JSON.stringify(l));}catch(e){}}
  function getCharList(){const chars=["主角"];if(hasVars&&hasLodash){allVars=getAllVariables();const fc=_.get(allVars,'stat_data.女性角色',{}),mc=_.get(allVars,'stat_data.男性角色',{});for(const n of Object.keys(fc))if(!chars.includes(n))chars.push(n);for(const n of Object.keys(mc))if(!chars.includes(n))chars.push(n);}const bl=getBlockedChars(),dl=getDeletedChars();return chars.filter(c=>!bl.includes(c)&&!dl.includes(c));}
  function getAllCharList(){const chars=["主角"];if(hasVars&&hasLodash){allVars=getAllVariables();const fc=_.get(allVars,'stat_data.女性角色',{}),mc=_.get(allVars,'stat_data.男性角色',{});for(const n of Object.keys(fc))if(!chars.includes(n))chars.push(n);for(const n of Object.keys(mc))if(!chars.includes(n))chars.push(n);}const dl=getDeletedChars();for(const d of dl)if(!chars.includes(d))chars.push(d);return chars;}
  function getEquippedIds(){const s=new Set();for(const cN of Object.keys(invData["已装备"]||{})){const ce=invData["已装备"][cN];if(ce["功法"])s.add(ce["功法"]);(ce["武功"]||[]).forEach(id=>s.add(id));if(ce["装备"])Object.values(ce["装备"]).forEach(id=>{if(id)s.add(id);});}return s;}

  /* ========== 角色管理 ========== */
  function blockChar(n){if(n==="主角"){showToast("无法屏蔽主角","error");return;}const l=getBlockedChars();if(!l.includes(n)){l.push(n);setBlockedChars(l);}if(currentChar===n)currentChar="主角";renderCharManage();renderAll();showToast(`已屏蔽: ${n}`,"info");}
  function unblockChar(n){setBlockedChars(getBlockedChars().filter(c=>c!==n));renderCharManage();renderAll();showToast(`已恢复: ${n}`,"success");}
  function deleteChar(n){if(n==="主角"){showToast("无法删除主角","error");return;}showConfirm('确认删除角色',`确定要永久删除「${n}」吗？\n将清除修炼数据和装备。`,async function(){delete attrData[n];if(invData["已装备"]&&invData["已装备"][n])delete invData["已装备"][n];const l=getDeletedChars();if(!l.includes(n)){l.push(n);setDeletedChars(l);}setBlockedChars(getBlockedChars().filter(c=>c!==n));if(currentChar===n)currentChar="主角";await saveAttrData();await saveInvData();if(hasTS)try{await triggerSlash(`/echo severity=warning 角色「${n}」已从修炼面板删除。`);}catch(e){}renderCharManage();renderAll();showToast(`已删除: ${n}`,"warning");});}
  function openCharManage(){renderCharManage();document.getElementById('charManageOverlay')?.classList.add('show');}
  function closeCharManage(){document.getElementById('charManageOverlay')?.classList.remove('show');}
  function renderCharManage(){const p=document.getElementById('charManagePanel');if(!p)return;const all=getAllCharList(),bl=getBlockedChars(),dl=getDeletedChars();let h=`<h3><i class="fas fa-users-gear"></i> 角色管理</h3>`;all.forEach(n=>{const isProt=n==="主角",isBl=bl.includes(n),isDl=dl.includes(n);let tag='',act='';if(isProt)tag='<span class="manage-char-tag protagonist">主角</span>';else if(isDl)tag='<span class="manage-char-tag blocked">已删除</span>';else if(isBl){tag='<span class="manage-char-tag blocked">已屏蔽</span>';act=`<button class="manage-action-btn unblock-btn" onclick="CultivationPanel.unblockChar('${n}')">恢复</button>`;}else act=`<button class="manage-action-btn block-btn" onclick="CultivationPanel.blockChar('${n}')">屏蔽</button><button class="manage-action-btn delete-btn" onclick="CultivationPanel.deleteChar('${n}')">删除</button>`;h+=`<div class="manage-char-item"><span class="manage-char-name">${n}</span>${tag}<div style="display:flex;gap:4px;">${act}</div></div>`;});h+=`<button class="manage-close-btn" onclick="CultivationPanel.closeCharManage()">关闭</button>`;p.innerHTML=h;}

  /* ========== 自动修炼 ========== */
  const AUTO_TRAIN_KEY='cultivation_auto_train';
  function getAutoTrainConfig(){try{return JSON.parse(localStorage.getItem(AUTO_TRAIN_KEY)||'{"enabled":false,"chars":{}}');}catch(e){return{enabled:false,chars:{}};}}
  function setAutoTrainConfig(c){try{localStorage.setItem(AUTO_TRAIN_KEY,JSON.stringify(c));}catch(e){}}
  function toggleAutoTrain(en){const c=getAutoTrainConfig();c.enabled=en;setAutoTrainConfig(c);renderAutoTrainList();showToast(en?'托管修炼已开启':'托管修炼已关闭','info');}
  function setAutoTrainTier(cn,ti){const c=getAutoTrainConfig();if(!c.chars)c.chars={};c.chars[cn]=parseInt(ti);setAutoTrainConfig(c);}
  async function processAutoTrain(){const config=getAutoTrainConfig();if(!config.enabled)return;const chars=getCharList().filter(c=>c!=="主角");let tc=0;for(const cN of chars){const ca=attrData[cN];if(!ca||ca["今日已修炼"])continue;const ti=(config.chars&&config.chars[cN]!==undefined)?config.chars[cN]:0,tier=TRAIN_TIERS[ti]||TRAIN_TIERS[0],wux=ca["悟性"]||0,ce=invData["已装备"]&&invData["已装备"][cN]?invData["已装备"][cN]:{};let gfM=1;if(ce["功法"]){const gf=(invData["背包"]||[]).find(i=>i.id===ce["功法"]);if(gf&&gf["经验倍率"])gfM=gf["经验倍率"];}const exp=Math.floor(tier.exp*(1+wux/100)*gfM);ca["经验值"]=(ca["经验值"]||0)+exp;ca["今日已修炼"]=true;tc++;}if(tc>0)showToast(`托管修炼: ${tc}位角色已自动修炼`,"success");}
  function renderAutoTrainList(){const l=document.getElementById('autoTrainList'),tg=document.getElementById('autoTrainToggle');if(!l)return;const config=getAutoTrainConfig();if(tg)tg.checked=config.enabled;const chars=getCharList().filter(c=>c!=="主角");if(chars.length===0){l.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:10px;">暂无其他角色</div>';return;}l.innerHTML='';chars.forEach(cn=>{const si=(config.chars&&config.chars[cn]!==undefined)?config.chars[cn]:0,d=document.createElement('div');d.className='auto-train-item';d.innerHTML=`<span class="at-name">${cn}</span><select onchange="CultivationPanel.setAutoTrainTier('${cn}',this.value)" ${!config.enabled?'disabled':''}>${TRAIN_TIERS.map((t,i)=>`<option value="${i}" ${i===si?'selected':''}>${t.name}(+${t.exp})</option>`).join('')}</select>`;l.appendChild(d);});}

  /* ========== 折叠偏好 ========== */
  const FOLD_STORAGE_KEY='cultivation_panel_default_fold';
  function loadFoldPreference(){try{return localStorage.getItem(FOLD_STORAGE_KEY)==='true';}catch(e){return false;}}
  function saveFoldPreference(f){try{localStorage.setItem(FOLD_STORAGE_KEY,f?'true':'false');}catch(e){}}
  function applyFoldPreference(){const f=loadFoldPreference(),d=document.getElementById('mainPanelDetails'),b=document.getElementById('foldSettingsBtn'),l=document.getElementById('foldSettingsLabel');if(d){if(f)d.removeAttribute('open');else d.setAttribute('open','');}if(b)b.classList.toggle('is-folded',f);if(l)l.textContent=f?'默认折叠':'默认展开';}
  function toggleDefaultFold(){const n=!loadFoldPreference();saveFoldPreference(n);applyFoldPreference();showToast(n?'已设置为默认折叠':'已设置为默认展开','info');}

  /* ========== 【重构】创意工坊 ========== */
  const WS_MODES = ['功法','武功','装备'];
  let wsState = { mode: '功法', name: '', quality: '精品',
    gf: { expMult: 1.7, selectedPassives: [], passiveParams: {} },
    wg: { type: '单体攻击', element: '火焰', range: 2, dmgMult: 1.5, neigongReq: 15, selectedEffects: [], effectParams: {} },
    zb: { slot: '武器', attrs: { 攻击力: 8, 防御力: 0, 内功: 0, 轻功: 0, 悟性: 0 } }
  };

  function wsResetState() {
    wsState = { mode: '功法', name: '', quality: '精品',
      gf: { expMult: 1.7, selectedPassives: [], passiveParams: {} },
      wg: { type: '单体攻击', element: '火焰', range: 2, dmgMult: 1.5, neigongReq: 15, selectedEffects: [], effectParams: {} },
      zb: { slot: '武器', attrs: { 攻击力: 8, 防御力: 0, 内功: 0, 轻功: 0, 悟性: 0 } }
    };
  }

  function openWorkshop() { wsResetState(); renderWorkshop(); document.getElementById('workshopOverlay')?.classList.add('show'); }
  function closeWorkshop() { document.getElementById('workshopOverlay')?.classList.remove('show'); }
  function wsSetMode(m) { wsState.mode = m; wsState.name = ''; renderWorkshop(); }

  function wsRandomName() {
    if (wsState.mode === '功法') wsState.name = pick(GONGFA_CORE) + pick(GONGFA_SUFFIX);
    else if (wsState.mode === '武功') {
      const s = wsState.wg;
      if (s.type === '队友治疗') wsState.name = pick(SKILL_HEAL_CORES) + pick(SKILL_HEAL_SUFFIX);
      else if (s.type === '自身增益') wsState.name = pick(SKILL_BUFF_CORES) + pick(SKILL_BUFF_SUFFIX);
      else { const g = SKILL_EFFECT_GROUPS[s.element]; wsState.name = pick(g ? g.cores : ["无名"]) + pick(SKILL_ATTACK_SUFFIX); }
    } else {
      const s = wsState.zb;
      if (s.slot === '武器') wsState.name = pick(WEAPON_NAMES.prefixes) + pick(WEAPON_NAMES.types);
      else if (s.slot === '防具') wsState.name = pick(ARMOR_NAMES.prefixes) + pick(ARMOR_NAMES.types);
      else wsState.name = pick(ACCS_NAMES.prefixes) + pick(ACCS_NAMES.types);
    }
    renderWorkshop();
  }

  function wsSetQuality(q) {
    wsState.quality = q;
    const mult = getQualityMult(q);
    wsState.gf.expMult = parseFloat(Math.min(1 + mult * 0.5, Math.max(1 + mult * 0.1, wsState.gf.expMult)).toFixed(1));
    const maxP = mult >= 3 ? 2 : 1;
    if (wsState.gf.selectedPassives.length > maxP) wsState.gf.selectedPassives = wsState.gf.selectedPassives.slice(0, maxP);
    const maxE = mult >= 3 ? 2 : (mult >= 2 ? 1 : (Math.random() > 0.4 ? 1 : 0));
    if (wsState.wg.selectedEffects.length > Math.max(1, maxE)) wsState.wg.selectedEffects = wsState.wg.selectedEffects.slice(0, Math.max(1, maxE));
    renderWorkshop();
  }

  /* 工坊内部参数变更 - 不重渲染，只更新预览和对应显示 */
  function wsUpdatePreviewOnly() {
    const el = document.getElementById('wsPreviewContent');
    if (el) el.textContent = buildWsPreviewText();
  }

  /* 防止工坊内滑块事件冒泡的修复 */
  function wsFixSliders() {
    const panel = document.getElementById('workshopPanel');
    if (!panel) return;
    panel.querySelectorAll('input[type="range"]').forEach(el => {
      el.onmousedown = function(e) { e.stopPropagation(); };
      el.ontouchstart = function(e) { e.stopPropagation(); };
      el.onclick = function(e) { e.stopPropagation(); };
    });
  }

  /* 功法被动切换 */
  function wsTogglePassive(idx) {
    const mult = getQualityMult(wsState.quality), maxP = mult >= 3 ? 2 : 1;
    const sel = wsState.gf.selectedPassives;
    if (sel.includes(idx)) {
      wsState.gf.selectedPassives = sel.filter(i => i !== idx);
      delete wsState.gf.passiveParams[idx];
    } else {
      if (sel.length >= maxP) { showToast(`当前品质最多 ${maxP} 个被动`, "warning"); return; }
      sel.push(idx);
      const p = GONGFA_PASSIVES[idx];
      wsState.gf.passiveParams[idx] = Math.floor(mult * (p.base + p.scale / 2));
    }
    renderWorkshop();
  }

  /* 武功效果切换 */
  function wsToggleEffect(effType) {
    const mult = getQualityMult(wsState.quality), maxE = mult >= 3 ? 2 : 1;
    const sel = wsState.wg.selectedEffects;
    if (sel.includes(effType)) {
      wsState.wg.selectedEffects = sel.filter(e => e !== effType);
      delete wsState.wg.effectParams[effType];
    } else {
      if (sel.length >= maxE) { showToast(`当前品质最多 ${maxE} 个效果`, "warning"); return; }
      sel.push(effType);
      const ep = EFFECT_PARAMS[effType];
      wsState.wg.effectParams[effType] = { val: Math.floor(mult * (ep.base + ep.scale / 2)), prob: Math.min(100, Math.floor(30 + mult * 10 + 10)) };
    }
    renderWorkshop();
  }

  function wsSetWgType(t) { wsState.wg.type = t; wsState.wg.selectedEffects = []; wsState.wg.effectParams = {}; renderWorkshop(); }
  function wsSetWgElement(el) { wsState.wg.element = el; wsState.wg.selectedEffects = []; wsState.wg.effectParams = {}; renderWorkshop(); }
  function wsSetZbSlot(s) { wsState.zb.slot = s; wsState.zb.attrs = { 攻击力: 0, 防御力: 0, 内功: 0, 轻功: 0, 悟性: 0 }; const mult = getQualityMult(wsState.quality); if (s === '武器') wsState.zb.attrs['攻击力'] = Math.floor(mult * 5); else if (s === '防具') wsState.zb.attrs['防御力'] = Math.floor(mult * 5); renderWorkshop(); }

  function buildWsPreviewText() {
    const name = wsState.name || '（未命名）', q = wsState.quality;
    if (wsState.mode === '功法') {
      let t = `[功法] ${name}\n品质: ${q}\n经验倍率: x${wsState.gf.expMult}`;
      if (wsState.gf.selectedPassives.length > 0) {
        t += '\n被动效果:';
        wsState.gf.selectedPassives.forEach(idx => {
          const p = GONGFA_PASSIVES[idx], val = wsState.gf.passiveParams[idx] || 0;
          t += `\n  [${p.type}] ${p.isPercent ? p.desc + val + '%' : p.desc + val}`;
        });
      }
      return t;
    } else if (wsState.mode === '武功') {
      const s = wsState.wg;
      let t = `[武功] ${name}\n品质: ${q}\n类型: ${s.type}`;
      if (s.type !== '队友治疗') t += ` | 倍率: ${s.dmgMult}x`;
      t += `\n范围: ${s.range} | 内功需求: ${s.neigongReq}`;
      if (s.selectedEffects.length > 0) {
        t += '\n效果:';
        s.selectedEffects.forEach(et => {
          const ep = EFFECT_PARAMS[et], params = s.effectParams[et] || {};
          if (et === '治疗') t += `\n  [治疗] 恢复量:${params.val || 0}`;
          else if (et === '增益') t += `\n  [增益] 提升:${params.val || 0}%`;
          else if (et === '反弹') t += `\n  [反弹] 比例:${params.val || 0}%`;
          else t += `\n  [${et}] ${ep.paramName}:${params.val || 0} 概率:${params.prob || 0}%`;
        });
      }
      return t;
    } else {
      const s = wsState.zb;
      let t = `[装备] ${name}\n品质: ${q}\n部位: ${s.slot}\n属性加成:`;
      ATTRS.forEach(a => { if (s.attrs[a] > 0) t += `\n  ${a} +${s.attrs[a]}`; });
      if (!ATTRS.some(a => s.attrs[a] > 0)) t += ' （无）';
      return t;
    }
  }

  function renderWorkshop() {
    const panel = document.getElementById('workshopPanel'); if (!panel) return;
    const mult = getQualityMult(wsState.quality);

    /* 模式选择栏 */
    let modeHtml = '<div class="ws-mode-bar">' + WS_MODES.map(m => {
      const icons = { '功法': 'fas fa-book', '武功': 'fas fa-hand-fist', '装备': 'fas fa-shield-halved' };
      return `<button class="ws-mode-btn${m === wsState.mode ? ' active' : ''}" onclick="CultivationPanel.wsSetMode('${m}')"><i class="${icons[m]}"></i> ${m}</button>`;
    }).join('') + '</div>';

    /* 名称输入 */
    let nameHtml = `<div class="ws-section"><div class="ws-section-title"><i class="fas fa-pen-fancy"></i> ${wsState.mode}名称</div><div class="ws-input-row"><input class="ws-input" type="text" placeholder="输入名称..." value="${wsState.name}" oninput="CultivationPanel._wsName(this.value)"><button class="ws-rand-btn" onclick="CultivationPanel.wsRandomName()"><i class="fas fa-dice"></i> 随机</button></div></div>`;

    /* 品质选择 */
    let qualityHtml = `<div class="ws-section"><div class="ws-section-title"><i class="fas fa-gem"></i> 品质选择</div><div class="ws-quality-grid">${QUALITIES.map(q => {
      const active = q.name === wsState.quality ? ' active' : '';
      return `<button class="ws-quality-btn${active}" style="border-color:${q.color};color:${q.color};${active ? `background:${q.color}22;` : ''}" onclick="CultivationPanel.wsSetQuality('${q.name}')">${q.name}</button>`;
    }).join('')}</div></div>`;

    /* 模式特定内容 */
    let specificHtml = '';
    if (wsState.mode === '功法') specificHtml = renderWsGongfa(mult);
    else if (wsState.mode === '武功') specificHtml = renderWsWugong(mult);
    else specificHtml = renderWsZhuangbei(mult);

    /* 预览 */
    let previewHtml = `<div class="ws-preview"><div class="ws-preview-title"><i class="fas fa-eye"></i> 实时预览</div><div class="ws-preview-content" id="wsPreviewContent">${buildWsPreviewText()}</div></div>`;

    /* 按钮 */
    let btnsHtml = `<div class="ws-action-btns"><button class="ws-cancel-btn" onclick="CultivationPanel.closeWorkshop()">取消</button><button class="ws-create-btn" onclick="CultivationPanel.wsCreate()"><i class="fas fa-check"></i> 铸造入袋</button></div>`;

    panel.innerHTML = `<h3><i class="fas fa-wand-sparkles"></i> 创意工坊</h3>${modeHtml}${nameHtml}${qualityHtml}${specificHtml}${previewHtml}${btnsHtml}`;

    /* 修复滑块事件冒泡 */
    wsFixSliders();
  }

  /* 功法专属区域 */
  function renderWsGongfa(mult) {
    const minExp = parseFloat((1 + mult * 0.1).toFixed(1)), maxExp = parseFloat((1 + mult * 0.5).toFixed(1));
    const curExp = Math.min(maxExp, Math.max(minExp, wsState.gf.expMult));

  /* 铸造创建 */
  async function wsCreate() {
    if (!wsState.name.trim()) { showToast("请输入名称", "error"); return; }
    let item;
    if (wsState.mode === '功法') {
      if (wsState.gf.selectedPassives.length === 0) { showToast("请至少选择一个被动效果", "error"); return; }
      const passives = wsState.gf.selectedPassives.map(idx => {
        const p = GONGFA_PASSIVES[idx], val = wsState.gf.passiveParams[idx] || 0;
        return { 类型: p.type, 描述: p.isPercent ? `${p.desc}${val}%` : `${p.desc}${val}`, [p.paramName]: val };
      });
      item = { id: "ws_" + uid(), 类别: "功法", 名称: wsState.name.trim(), 品质: wsState.quality, 经验倍率: wsState.gf.expMult, 被动效果: passives };
    } else if (wsState.mode === '武功') {
      const s = wsState.wg;
      const effects = s.selectedEffects.map(et => {
        const ep = EFFECT_PARAMS[et], params = s.effectParams[et] || {};
        const val = params.val || 0, prob = params.prob || 100;
        let desc = '';
        if (et === '治疗') desc = `以内力为队友恢复生命，恢复量:${val}`;
        else if (et === '增益') desc = `提高自身攻击力${val}%`;
        else if (et === '反弹') desc = `将受到伤害的${val}%反弹给攻击者`;
        else if (et === '即死') desc = `${prob}%概率直接击杀目标`;
        else desc = `命中后使目标${et}，${ep.paramName}:${val}`;
        const obj = { 类型: et, 描述: desc, [ep.paramName]: val, "概率(%)": prob };
        return obj;
      });
      item = {
        id: "ws_" + uid(), 类别: "武功", 名称: wsState.name.trim(), 品质: wsState.quality,
        类型: s.type, 攻击范围: s.range,
        伤害倍率: s.type === '队友治疗' ? 0 : parseFloat(s.dmgMult.toFixed(1)),
        效果: effects, 内功需求: s.neigongReq
      };
    } else {
      const s = wsState.zb;
      const bonuses = {};
      ATTRS.forEach(a => { if (s.attrs[a] > 0) bonuses[a] = s.attrs[a]; });
      if (Object.keys(bonuses).length === 0) { showToast("请至少设定一项属性加成", "error"); return; }
      item = { id: "ws_" + uid(), 类别: "装备", 名称: wsState.name.trim(), 品质: wsState.quality, 部位: s.slot, 属性加成: bonuses };
    }
    invData["背包"].push(item);
    await saveInvData(); closeWorkshop(); renderAll();
    showToast(`${wsState.mode}「${item["名称"]}」已铸造入袋`, "success");
  }
