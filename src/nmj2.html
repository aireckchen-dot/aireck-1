<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<style>
/* ═══ 根变量 ═══ */
:root {
  --ds-bg: #0a0a0a;
  --ds-bg2: #111111;
  --ds-bg3: #1a1a1a;
  --ds-gold: #c8a84e;
  --ds-gold-dim: #8a7535;
  --ds-gold-bright: #e8d080;
  --ds-red: #8b1a1a;
  --ds-red-bright: #cc3333;
  --ds-green: #2a6e2a;
  --ds-blue: #2a4a6e;
  --ds-purple: #4a2a6e;
  --ds-text: #b0a080;
  --ds-text-dim: #665e4a;
  --ds-border: #2a2520;
  --ds-border-light: #3a3530;
  --ds-glow: 0 0 8px rgba(200, 168, 78, 0.3);
  --ds-font: 'Georgia', 'Times New Roman', 'SimSun', serif;
}

/* ═══ 入场动画 ═══ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes glowPulse {
  0%, 100% { text-shadow: 0 0 4px rgba(200,168,78,0.4), 0 0 12px rgba(200,168,78,0.15); }
  50% { text-shadow: 0 0 8px rgba(200,168,78,0.7), 0 0 20px rgba(200,168,78,0.3); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes barFillWidth {
  from { width: 0%; }
}
@keyframes ashFloat {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
  50% { opacity: 0.3; }
  100% { transform: translateY(-60px) rotate(180deg); opacity: 0; }
}
@keyframes borderShimmer {
  0% { border-color: var(--ds-border); }
  50% { border-color: var(--ds-gold-dim); }
  100% { border-color: var(--ds-border); }
}
@keyframes pulseRed {
  0%, 100% { color: var(--ds-red-bright); }
  50% { color: #ff5555; text-shadow: 0 0 6px rgba(255,50,50,0.5); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ═══ 容器 ═══ */
.ds-root {
  font-family: var(--ds-font);
  background: var(--ds-bg);
  color: var(--ds-text);
  max-width: 100%;
  margin: 10px auto;
  border: 1px solid var(--ds-border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  animation: fadeInUp 0.6s ease-out;
  box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
}
/* 灰烬粒子 */
.ds-root::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(200,168,78,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(200,168,78,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 40%, rgba(200,168,78,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(200,168,78,0.15) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
  animation: ashFloat 12s ease-in-out infinite;
}
.ds-root > * { position: relative; z-index: 1; }

/* ═══ 折叠控制 ═══ */
.ds-details { width: 100%; }
.ds-summary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 10px 15px;
  background: linear-gradient(180deg, #1a1815, #0d0c0a);
  color: var(--ds-gold);
  cursor: pointer;
  list-style: none;
  font-size: 16px;
  letter-spacing: 3px;
  text-align: center;
  border-bottom: 1px solid var(--ds-border);
  transition: background 0.3s;
  animation: glowPulse 3s ease-in-out infinite;
}
.ds-summary::-webkit-details-marker { display: none; }
.ds-summary:hover { background: linear-gradient(180deg, #222018, #0d0c0a); }
.ds-summary .chevron {
  transition: transform 0.3s;
  font-size: 12px;
}
.ds-details[open] .ds-summary .chevron { transform: rotate(180deg); }

/* ═══ 顶部时间栏 ═══ */
.ds-header {
  background: linear-gradient(180deg, #151310, #0a0908);
  padding: 12px 15px;
  border-bottom: 1px solid var(--ds-border);
  text-align: center;
  animation: fadeInUp 0.4s ease-out;
}
.ds-header-era {
  font-size: 20px;
  color: var(--ds-gold);
  letter-spacing: 6px;
  margin-bottom: 6px;
  animation: glowPulse 4s ease-in-out infinite;
  background: linear-gradient(90deg, transparent, var(--ds-gold), var(--ds-gold-bright), var(--ds-gold), transparent);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite, glowPulse 4s ease-in-out infinite;
}
.ds-header-row {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 16px;
  font-size: 13px;
  color: var(--ds-text-dim);
  margin: 4px 0;
}
.ds-header-row span { white-space: nowrap; }
.ds-header-row .ds-val { color: var(--ds-text); }
.ds-header-location {
  font-size: 12px;
  color: var(--ds-gold-dim);
  margin-top: 4px;
  font-style: italic;
}
.ds-header-mood {
  font-size: 11px;
  color: var(--ds-text-dim);
  margin-top: 3px;
  font-style: italic;
  opacity: 0.7;
}

/* ═══ 标签页系统 ═══ */
.ds-tabs {
  display: flex; flex-wrap: wrap;
  background: var(--ds-bg2);
  border-bottom: 1px solid var(--ds-border);
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.ds-tabs::-webkit-scrollbar { display: none; }
.ds-tab-btn {
  flex: 1; min-width: 60px;
  padding: 8px 5px;
  background: transparent;
  color: var(--ds-text-dim);
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--ds-font);
  font-size: 12px;
  transition: all 0.3s;
  white-space: nowrap;
  text-align: center;
}
.ds-tab-btn:hover { color: var(--ds-text); background: rgba(200,168,78,0.05); }
.ds-tab-btn.active {
  color: var(--ds-gold);
  border-bottom-color: var(--ds-gold);
  background: rgba(200,168,78,0.08);
  text-shadow: 0 0 6px rgba(200,168,78,0.3);
}
.ds-tab-btn i { display: block; font-size: 16px; margin-bottom: 2px; }

.ds-tab-content {
  display: none;
  padding: 12px;
  animation: fadeInUp 0.35s ease-out;
}
.ds-tab-content.active { display: block; }

/* ═══ 通用卡片 ═══ */
.ds-card {
  background: linear-gradient(135deg, rgba(26,25,20,0.95), rgba(15,14,10,0.95));
  border: 1px solid var(--ds-border);
  border-radius: 3px;
  padding: 12px;
  margin-bottom: 10px;
  transition: border-color 0.3s, box-shadow 0.3s;
  animation: fadeInUp 0.4s ease-out both;
}
.ds-card:hover {
  border-color: var(--ds-gold-dim);
  box-shadow: var(--ds-glow);
}
.ds-card-title {
  font-size: 13px;
  color: var(--ds-gold);
  letter-spacing: 2px;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--ds-border);
  display: flex; align-items: center; gap: 6px;
}
.ds-card-title i { font-size: 14px; }

/* ═══ 属性行 ═══ */
.ds-prop {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(42,37,32,0.5);
  transition: background 0.2s;
}
.ds-prop:last-child { border-bottom: none; }
.ds-prop:hover { background: rgba(200,168,78,0.03); }
.ds-prop-name { color: var(--ds-text-dim); }
.ds-prop-val { color: var(--ds-text); text-align: right; max-width: 60%; word-break: break-all; }

/* ═══ 进度条 ═══ */
.ds-bar-wrap {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0;
  font-size: 12px;
}
.ds-bar-label { color: var(--ds-text-dim); min-width: 70px; white-space: nowrap; }
.ds-bar-track {
  flex: 1; height: 10px;
  background: rgba(20,18,15,0.9);
  border: 1px solid var(--ds-border);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.ds-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.8s ease-out;
  animation: barFillWidth 1s ease-out;
  position: relative;
}
/* 流光效果 */
.ds-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  background-size: 200% 100%;
  animation: shimmer 2.5s linear infinite;
}
.ds-bar-fill.gold { background: linear-gradient(90deg, #6a5a2a, var(--ds-gold)); }
.ds-bar-fill.red { background: linear-gradient(90deg, #4a1010, var(--ds-red-bright)); }
.ds-bar-fill.green { background: linear-gradient(90deg, #1a3a1a, #3a8a3a); }
.ds-bar-fill.blue { background: linear-gradient(90deg, #1a2a4a, #3a6aaa); }
.ds-bar-fill.purple { background: linear-gradient(90deg, #2a1a4a, #6a3aaa); }
.ds-bar-fill.crimson { background: linear-gradient(90deg, #2a0a0a, #aa2020); }
.ds-bar-val {
  min-width: 50px; text-align: right;
  color: var(--ds-text);
  font-size: 11px;
}

/* 危险状态闪烁 */
.ds-bar-fill.danger { animation: barFillWidth 1s ease-out, pulseRed 1.5s ease-in-out infinite; }

/* ═══ 双色对比条 ═══ */
.ds-dual-bar {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 0; font-size: 12px;
}
.ds-dual-track {
  flex: 1; height: 12px;
  background: var(--ds-bg);
  border: 1px solid var(--ds-border);
  border-radius: 2px;
  display: flex; overflow: hidden;
}
.ds-dual-left {
  background: linear-gradient(90deg, #d4e8ff, #88bbff);
  transition: width 0.8s;
}
.ds-dual-right {
  background: linear-gradient(90deg, #880022, #440011);
  transition: width 0.8s;
}

/* ═══ 部位HP网格 ═══ */
.ds-body-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
@media (max-width: 400px) {
  .ds-body-grid { grid-template-columns: 1fr; }
}
.ds-body-part {
  background: rgba(15,14,10,0.8);
  border: 1px solid var(--ds-border);
  border-radius: 3px;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 3px;
  transition: border-color 0.3s, box-shadow 0.3s;
  cursor: default;
}
.ds-body-part:hover {
  border-color: var(--ds-gold-dim);
  box-shadow: 0 0 6px rgba(200,168,78,0.15);
}
.ds-body-part-name {
  font-size: 11px;
  color: var(--ds-gold-dim);
  display: flex; justify-content: space-between;
}

/* ═══ 统计徽章 ═══ */
.ds-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
}
.ds-stat-badge {
  background: rgba(15,14,10,0.9);
  border: 1px solid var(--ds-border);
  border-radius: 3px;
  padding: 10px 8px;
  text-align: center;
  transition: all 0.3s;
  cursor: default;
}
.ds-stat-badge:hover {
  border-color: var(--ds-gold-dim);
  transform: translateY(-2px);
  box-shadow: var(--ds-glow);
}
.ds-stat-badge .num {
  display: block;
  font-size: 22px;
  color: var(--ds-gold);
  animation: glowPulse 3s ease-in-out infinite;
}
.ds-stat-badge .label {
  font-size: 11px;
  color: var(--ds-text-dim);
  margin-top: 3px;
}

/* ═══ 装备槽 ═══ */
.ds-equip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
@media (max-width: 400px) {
  .ds-equip-grid { grid-template-columns: 1fr 1fr; }
}
.ds-equip-slot {
  background: rgba(15,14,10,0.9);
  border: 1px solid var(--ds-border);
  border-radius: 3px;
  padding: 8px;
  text-align: center;
  transition: all 0.3s;
  cursor: default;
  animation: fadeInUp 0.5s ease-out both;
}
.ds-equip-slot:hover {
  border-color: var(--ds-gold-dim);
  transform: scale(1.03);
  box-shadow: var(--ds-glow);
}
.ds-equip-slot .slot-icon {
  font-size: 20px;
  color: var(--ds-gold-dim);
  margin-bottom: 4px;
}
.ds-equip-slot .slot-name {
  font-size: 10px;
  color: var(--ds-text-dim);
  margin-bottom: 3px;
}
.ds-equip-slot .slot-val {
  font-size: 12px;
  color: var(--ds-text);
  word-break: break-all;
}

/* ═══ 外貌分组 ═══ */
.ds-appearance-group {
  margin-bottom: 8px;
}
.ds-appearance-group-title {
  font-size: 12px;
  color: var(--ds-gold-dim);
  padding: 4px 0;
  border-bottom: 1px dashed var(--ds-border);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}
.ds-appearance-item {
  display: flex; justify-content: space-between;
  padding: 3px 8px;
  font-size: 12px;
  transition: background 0.2s;
}
.ds-appearance-item:hover { background: rgba(200,168,78,0.03); }
.ds-appearance-item .a-label { color: var(--ds-text-dim); min-width: 70px; }
.ds-appearance-item .a-val { color: var(--ds-text); text-align: right; flex: 1; word-break: break-all; white-space: pre-wrap; }

/* ═══ 伙伴卡片 ═══ */
.ds-companion-card {
  background: linear-gradient(135deg, rgba(20,18,14,0.95), rgba(12,11,8,0.95));
  border: 1px solid var(--ds-border);
  border-radius: 3px;
  padding: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
  animation: slideIn 0.5s ease-out both;
}
.ds-companion-card:hover {
  border-color: var(--ds-gold-dim);
  box-shadow: var(--ds-glow);
}
.ds-companion-card.empty {
  opacity: 0.4;
  border-style: dashed;
}
.ds-companion-name {
  font-size: 16px;
  color: var(--ds-gold);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
  animation: glowPulse 4s ease-in-out infinite;
}
.ds-companion-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(200,168,78,0.15);
  color: var(--ds-gold-dim);
}

/* ═══ 侵蚀条特殊样式 ═══ */
.ds-erosion-item {
  margin-bottom: 8px;
}
.ds-erosion-name {
  font-size: 12px;
  color: var(--ds-text-dim);
  margin-bottom: 3px;
  display: flex; justify-content: space-between;
}

/* ═══ 互动气泡（Tooltip） ═══ */
.ds-tip {
  position: relative;
  cursor: help;
}
.ds-tip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%) translateY(-4px);
  background: rgba(20,18,14,0.95);
  color: var(--ds-gold);
  padding: 5px 10px;
  border-radius: 3px;
  border: 1px solid var(--ds-gold-dim);
  font-size: 11px;
  white-space: nowrap;
  opacity: 0; visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
  z-index: 100;
  pointer-events: none;
  box-shadow: 0 0 10px rgba(200,168,78,0.2);
}
.ds-tip:hover::after { opacity: 1; visibility: visible; }

/* ═══ 点击涟漪 ═══ */
.ds-ripple {
  position: relative; overflow: hidden;
}
.ds-ripple .ripple-effect {
  position: absolute;
  border-radius: 50%;
  background: rgba(200,168,78,0.15);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* ═══ 分隔装饰 ═══ */
.ds-divider {
  text-align: center;
  color: var(--ds-border-light);
  font-size: 11px;
  letter-spacing: 4px;
  padding: 8px 0;
  opacity: 0.5;
}

/* ═══ 响应式微调 ═══ */
@media (max-width: 480px) {
  .ds-root { margin: 5px; }
  .ds-header-era { font-size: 16px; letter-spacing: 4px; }
  .ds-tab-btn { font-size: 11px; padding: 6px 3px; }
  .ds-tab-btn i { font-size: 14px; }
  .ds-card { padding: 8px; }
  .ds-equip-grid { grid-template-columns: 1fr 1fr; }
  .ds-stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>

<div class="ds-root" id="ds-status-panel">

  <!-- ═══ 顶部时间栏 ═══ -->
  <div class="ds-header">
    <div class="ds-header-era" id="ds-era">⚜ 苦 难 纪 元 ⚜</div>
    <div class="ds-header-row">
      <span>📅 <span class="ds-val" id="ds-date">--</span></span>
      <span>| <span class="ds-val" id="ds-weekday">--</span></span>
      <span>| 🕐 <span class="ds-val" id="ds-time">--</span></span>
      <span>| ☁ <span class="ds-val" id="ds-weather">--</span></span>
      <span>| Day <span class="ds-val" id="ds-daycount">0</span></span>
    </div>
    <div class="ds-header-location">📍 <span id="ds-location">--</span></div>
    <div class="ds-header-mood">「<span id="ds-atmosphere">--</span>」</div>
  </div>

  <!-- ═══ 折叠包裹 ═══ -->
  <details class="ds-details" open>
    <summary class="ds-summary">
      <span>⚔ 灵 魂 铭 刻 ⚔</span>
      <span class="chevron">▼</span>
    </summary>

    <!-- 标签页按钮 -->
    <div class="ds-tabs" id="ds-tabs">
      <button class="ds-tab-btn active" data-tab="tab-overview"><i class="fas fa-scroll"></i>总览</button>
      <button class="ds-tab-btn" data-tab="tab-combat"><i class="fas fa-shield-halved"></i>战斗</button>
      <button class="ds-tab-btn" data-tab="tab-equip"><i class="fas fa-suitcase"></i>装备</button>
      <button class="ds-tab-btn" data-tab="tab-look"><i class="fas fa-eye"></i>外貌</button>
      <button class="ds-tab-btn" data-tab="tab-abyss"><i class="fas fa-moon"></i>深渊</button>
      <button class="ds-tab-btn" data-tab="tab-ally"><i class="fas fa-users"></i>伙伴</button>
    </div>

    <!-- ═══ TAB 1: 总览 ═══ -->
    <div class="ds-tab-content active" id="tab-overview">

      <!-- 基本信息1 -->
      <div class="ds-card" style="animation-delay:0.05s">
        <div class="ds-card-title"><i class="fas fa-id-card"></i> 身份铭文</div>
        <div id="ds-bio1"></div>
      </div>

      <!-- 基本信息2 -->
      <div class="ds-card" style="animation-delay:0.1s">
        <div class="ds-card-title"><i class="fas fa-compass"></i> 使命与境界</div>
        <div id="ds-bio2"></div>
      </div>

      <!-- 魂量/等级 -->
      <div class="ds-card" style="animation-delay:0.15s">
        <div class="ds-card-title"><i class="fas fa-fire"></i> 魂之回响</div>
        <div id="ds-soul"></div>
      </div>

      <!-- 统计 -->
      <div class="ds-card" style="animation-delay:0.2s">
        <div class="ds-card-title"><i class="fas fa-chart-bar"></i> 命运刻痕</div>
        <div class="ds-stats-grid" id="ds-stats"></div>
      </div>
    </div>

    <!-- ═══ TAB 2: 战斗 ═══ -->
    <div class="ds-tab-content" id="tab-combat">

      <!-- 六维属性 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-diamond"></i> 六维属性</div>
        <div id="ds-attrs"></div>
      </div>

      <!-- 纯洁/堕落 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-yin-yang"></i> 灵魂天平</div>
        <div id="ds-purity"></div>
      </div>

      <!-- 体力/耐力 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-heart-pulse"></i> 生命律动</div>
        <div id="ds-vitals"></div>
      </div>

      <!-- 部位HP -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-person"></i> 躯体损伤</div>
        <div class="ds-body-grid" id="ds-body"></div>
      </div>
    </div>

    <!-- ═══ TAB 3: 装备/背包 ═══ -->
    <div class="ds-tab-content" id="tab-equip">

      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-helmet-safety"></i> 装备栏</div>
        <div class="ds-equip-grid" id="ds-equipment"></div>
      </div>

      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-box-open"></i> 背包</div>
        <div id="ds-inventory"></div>
      </div>
    </div>

    <!-- ═══ TAB 4: 外貌 ═══ -->
    <div class="ds-tab-content" id="tab-look">
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-mask"></i> 形貌铭记</div>
        <div id="ds-appearance"></div>
      </div>
    </div>

    <!-- ═══ TAB 5: 深渊 ═══ -->
    <div class="ds-tab-content" id="tab-abyss">

      <!-- 性癖深度 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-brain"></i> 深渊烙印</div>
        <div id="ds-fetish"></div>
      </div>

      <!-- 世界侵蚀 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-virus"></i> 世界侵蚀程度</div>
        <div id="ds-erosion"></div>
      </div>

      <!-- 契约 -->
      <div class="ds-card">
        <div class="ds-card-title"><i class="fas fa-file-contract"></i> 已签订契约</div>
        <div class="ds-prop"><span class="ds-prop-val" id="ds-contract" style="width:100%;text-align:left;">--</span></div>
      </div>
    </div>

    <!-- ═══ TAB 6: 伙伴 ═══ -->
    <div class="ds-tab-content" id="tab-ally">
      <div id="ds-companions"></div>
    </div>

  </details>

  <!-- 在场角色追踪 -->
  <div style="padding:6px 12px; border-top:1px solid var(--ds-border); font-size:11px; color:var(--ds-text-dim); text-align:center;">
    在场：<span id="ds-present" style="color:var(--ds-text);">--</span>
  </div>
</div>

<script>
(function() {
  /* ── 工具函数 ── */
  const hasVars = typeof getAllVariables === 'function';
  const hasLodash = typeof _ !== 'undefined' && typeof _.get === 'function';
  let V = {};
  if (hasVars && hasLodash) V = getAllVariables();
  else if (!hasLodash) window._ = { get: (o, p, d) => d };

  function g(path, def) { return _.get(V, 'stat_data.' + path, def ?? '--'); }
  function pct(cur, max) { return max > 0 ? Math.min(100, Math.round((cur / max) * 100)) : 0; }

  function makeBar(label, curVal, maxVal, colorClass, tipText) {
    const p = pct(curVal, maxVal);
    const danger = p <= 25 ? ' danger' : '';
    const tipAttr = tipText ? ` class="ds-tip" data-tip="${tipText}"` : '';
    return `<div class="ds-bar-wrap"${tipAttr}>
      <span class="ds-bar-label">${label}</span>
      <div class="ds-bar-track"><div class="ds-bar-fill ${colorClass}${danger}" style="width:${p}%"></div></div>
      <span class="ds-bar-val">${curVal}/${maxVal}</span>
    </div>`;
  }

  function makeBarSimple(label, val, max, colorClass, tipText) {
    const p = max > 0 ? Math.min(100, Math.round((val / max) * 100)) : 0;
    const tipAttr = tipText ? ` class="ds-tip" data-tip="${tipText}"` : '';
    return `<div class="ds-bar-wrap"${tipAttr}>
      <span class="ds-bar-label">${label}</span>
      <div class="ds-bar-track"><div class="ds-bar-fill ${colorClass}" style="width:${p}%"></div></div>
      <span class="ds-bar-val">${val}</span>
    </div>`;
  }

  function makeProp(name, val) {
    return `<div class="ds-prop"><span class="ds-prop-name">${name}</span><span class="ds-prop-val">${val}</span></div>`;
  }

  function makeAppearanceItem(label, val) {
    return `<div class="ds-appearance-item"><span class="a-label">${label}</span><span class="a-val">${val}</span></div>`;
  }

  /* ── 顶部时间栏 ── */
  document.getElementById('ds-date').textContent = g('世界时间.世界.当前日期', '--');
  document.getElementById('ds-weekday').textContent = g('世界时间.世界.星期', '--');
  document.getElementById('ds-time').textContent = g('世界时间.世界.当前时间', '--');
  document.getElementById('ds-weather').textContent = g('世界时间.世界.天气', '--');
  document.getElementById('ds-daycount').textContent = g('世界时间.世界.经过天数', 0);
  document.getElementById('ds-location').textContent = g('具体地点.主角.当前位置', '--');
  document.getElementById('ds-atmosphere').textContent = g('情景氛围', '--');

  /* ── TAB 1: 总览 ── */
  // 基本信息1
  const bio1 = document.getElementById('ds-bio1');
  bio1.innerHTML = [
    makeProp('姓名', g('主角基本信息.姓名')),
    makeProp('性别', g('主角基本信息.性别')),
    makeProp('种族', g('主角基本信息.种族')),
    makeProp('年龄', g('主角基本信息.年龄')),
    makeProp('身高', g('主角基本信息.身高') + ' cm'),
    makeProp('体重', g('主角基本信息.体重') + ' kg'),
    makeProp('三围', g('主角基本信息.三围')),
  ].join('');

  // 基本信息2
  const bio2 = document.getElementById('ds-bio2');
  bio2.innerHTML = [
    makeProp('当前任务', g('主角.当前任务')),
    makeProp('总等级', g('主角.总等级')),
    makeProp('职业', g('主角.职业')),
    makeProp('身份', g('主角.身份')),
    makeProp('特殊状态', g('主角.特殊状态')),
    makeProp('已习得技能', g('主角.已习得技能')),
    makeProp('装备技能', g('主角.装备技能')),
    makeProp('当前内心', `「${g('主角.当前内心')}」`),
  ].join('');

  // 魂量
  const soul = document.getElementById('ds-soul');
  const curSoul = g('主角.当前魂量', 0);
  const needSoul = g('主角.升级所需魂量', 150);
  const needForge = g('主角.强化所需魂量', 0);
  soul.innerHTML = `
    ${makeBar('升级进度', curSoul, needSoul, 'gold', '当前魂量 / 升级所需')}
    ${makeProp('当前魂量', curSoul)}
    ${makeProp('升级所需', needSoul)}
    ${makeProp('强化所需', needForge)}
  `;

  // 统计
  const stats = document.getElementById('ds-stats');
  stats.innerHTML = [
    { n: '战败', v: g('主角统计.战败次数', 0) },
    { n: '死亡', v: g('主角统计.死亡次数', 0) },
    { n: '性爱', v: g('主角统计.性爱次数', 0) },
    { n: '调教', v: g('主角统计.调教次数', 0) },
  ].map(s => `<div class="ds-stat-badge ds-ripple"><span class="num">${s.v}</span><span class="label">${s.n}</span></div>`).join('');

  /* ── TAB 2: 战斗 ── */
  // 六维
  const attrs = document.getElementById('ds-attrs');
  const attrList = [
    { label: '力量 STR', path: '主角.力量(STR)', color: 'red' },
    { label: '敏捷 AGI', path: '主角.敏捷(AGI)', color: 'green' },
    { label: '体质 CON', path: '主角.体质(CON)', color: 'gold' },
    { label: '智力 INT', path: '主角.智力(INT)', color: 'blue' },
    { label: '意志 WIL', path: '主角.意志(WIL)', color: 'purple' },
    { label: '痛阈值', path: '主角.痛阈值', color: 'crimson' },
  ];
  attrs.innerHTML = attrList.map(a => makeBarSimple(a.label, g(a.path, 5), 100, a.color)).join('');

  // 纯洁/堕落
  const purity = document.getElementById('ds-purity');
  const pr = g('主角.纯洁共鸣强度(PR)', 100);
  const ci = g('主角.堕落渗透度(CI)', 0);
  purity.innerHTML = `
    <div class="ds-dual-bar">
      <span style="color:#88bbff;min-width:30px;">${pr}</span>
      <div class="ds-dual-track">
        <div class="ds-dual-left" style="width:${pr}%"></div>
        <div class="ds-dual-right" style="width:${ci}%"></div>
      </div>
      <span style="color:#cc3333;min-width:30px;text-align:right;">${ci}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ds-text-dim);padding:0 4px;">
      <span>☀ 纯洁共鸣</span><span>堕落渗透 ☾</span>
    </div>
  `;

  // 体力/耐力
  const vitals = document.getElementById('ds-vitals');
  const curSTA = g('主角.当前体力(STA)', 30);
  const maxSTA = g('主角.体力(STA)上限', 30);
  const curEND = g('主角.当前耐力(END)', 62);
  const maxEND = g('主角.耐力(END)上限', 62);
  vitals.innerHTML = `
    ${makeBar('体力 STA', curSTA, maxSTA, 'green', '体力值')}
    ${makeBar('耐力 END', curEND, maxEND, 'blue', '耐力值')}
  `;

  // 部位HP
  const body = document.getElementById('ds-body');
  const bodyParts = [
    { name: '头部', cur: '主角部位HP.当前头部HP', max: '主角部位HP.头部HP上限', icon: '🧠' },
    { name: '胸部/背部', cur: '主角部位HP.当前胸部/背部HP', max: '主角部位HP.胸部/背部HP上限', icon: '🫁' },
    { name: '腹部', cur: '主角部位HP.当前腹部HP', max: '主角部位HP.腹部HP上限', icon: '🫃' },
    { name: '右臂', cur: '主角部位HP.当前右臂HP', max: '主角部位HP.右臂HP上限', icon: '💪' },
    { name: '左臂', cur: '主角部位HP.当前左臂HP', max: '主角部位HP.左臂HP上限', icon: '🦾' },
    { name: '右腿', cur: '主角部位HP.当前右腿HP', max: '主角部位HP.右腿HP上限', icon: '🦵' },
    { name: '左腿', cur: '主角部位HP.当前左腿HP', max: '主角部位HP.左腿HP上限', icon: '🦿' },
  ];
  body.innerHTML = bodyParts.map(bp => {
    const c = g(bp.cur, 0), m = g(bp.max, 1);
    const p = pct(c, m);
    const barColor = p <= 25 ? 'crimson' : p <= 50 ? 'red' : 'green';
    return `<div class="ds-body-part ds-ripple">
      <div class="ds-body-part-name"><span>${bp.icon} ${bp.name}</span><span>${c}/${m}</span></div>
      <div class="ds-bar-track" style="height:6px;"><div class="ds-bar-fill ${barColor}${p<=25?' danger':''}" style="width:${p}%"></div></div>
    </div>`;
  }).join('');

  /* ── TAB 3: 装备/背包 ── */
  const equipment = document.getElementById('ds-equipment');
  const equipSlots = [
    { name: '头部', path: '主角装备.头部', icon: 'fa-hat-wizard' },
    { name: '胸部', path: '主角装备.胸部', icon: 'fa-vest' },
    { name: '肩部', path: '主角装备.肩部', icon: 'fa-vest-patches' },
    { name: '手部', path: '主角装备.手部', icon: 'fa-mitten' },
    { name: '腿部', path: '主角装备.腿部', icon: 'fa-socks' },
    { name: '脚部', path: '主角装备.脚部', icon: 'fa-shoe-prints' },
    { name: '主手', path: '主角装备.主手武器', icon: 'fa-gavel' },
    { name: '副手', path: '主角装备.副手武器', icon: 'fa-shield' },
    { name: '饰品', path: '主角装备.饰品', icon: 'fa-ring' },
  ];
  equipment.innerHTML = equipSlots.map(s => {
    const val = g(s.path, '无');
    const isEmpty = val === '无' || val === '--';
    return `<div class="ds-equip-slot ds-ripple" style="${isEmpty ? 'opacity:0.5;' : ''}">
      <div class="slot-icon"><i class="fas ${s.icon}"></i></div>
      <div class="slot-name">${s.name}</div>
      <div class="slot-val">${val}</div>
    </div>`;
  }).join('');

  const inventory = document.getElementById('ds-inventory');
  inventory.innerHTML = [
    makeProp('道具列表', g('主角背包.道具列表')),
    makeProp('消耗品', g('主角背包.消耗品')),
    makeProp('关键道具', g('主角背包.关键道具')),
    makeProp('锻造素材', g('主角背包.锻造素材', 0)),
  ].join('');

  /* ── TAB 4: 外貌 ── */
  const appearance = document.getElementById('ds-appearance');
  const appGroups = [
    { title: '⚜ 总体', items: [
      ['整体印象', '主角外貌.整体印象与姿态'],
      ['衣着状态', '主角外貌.衣着状态'],
    ]},
    { title: '👔 穿着', items: [
      ['外衫', '主角外貌.外衫'], ['内衬', '主角外貌.内衬'], ['贴身衣物', '主角外貌.贴身衣物'],
      ['下身', '主角外貌.下身'], ['袜子', '主角外貌.袜子'], ['鞋子', '主角外貌.鞋子'],
      ['配饰', '主角外貌.配饰'], ['内衣', '主角外貌.内衣'], ['内裤', '主角外貌.内裤'],
    ]},
    { title: '👤 面容', items: [
      ['发型与妆容', '主角外貌.发型与妆容'],
      ['面部表情', '主角外貌.面部表情与眼神'],
      ['唇与口部', '主角外貌.唇与口部'],
    ]},
    { title: '🦴 躯体', items: [
      ['颈项锁骨', '主角外貌.颈项与锁骨'], ['胸部', '主角外貌.胸部状态'],
      ['腰腹背部', '主角外貌.腰腹背部'], ['臀部', '主角外貌.臀部形态'],
      ['腿部足踝', '主角外貌.腿部与足踝'], ['手部', '主角外貌.手部'],
    ]},
    { title: '🔞 隐秘', items: [
      ['阴部', '主角外貌.阴部状态'], ['阴茎', '主角外貌.阴茎状态'],
      ['子宫', '主角外貌.子宫状态'], ['肛门', '主角外貌.肛门状态'],
    ]},
  ];
  appearance.innerHTML = appGroups.map(grp => `
    <div class="ds-appearance-group">
      <div class="ds-appearance-group-title">${grp.title}</div>
      ${grp.items.map(i => makeAppearanceItem(i[0], g(i[1]))).join('')}
    </div>
  `).join('');

  /* ── TAB 5: 深渊 ── */
  // 性癖
  const fetish = document.getElementById('ds-fetish');
  const fetishList = [
    '受虐欲深度', '暴露欲深度', '身份凌辱欲深度', '紧缚欲深度', '异物欲深度',
    '吞食欲深度', '音色欲深度', '异种欲深度', '羞耻痛快欲深度', '公众展示欲深度'
  ];
  fetish.innerHTML = fetishList.map(f => {
    const val = g('主角性癖深度.' + f, 0);
    const label = f.replace('深度', '');
    return makeBarSimple(label, val, 100, 'purple');
  }).join('');

  // 侵蚀
  const erosion = document.getElementById('ds-erosion');
  const erosionAreas = [
    '区域一：灰烬摇篮', '区域二：低语森林与静滞沼泽', '区域三：废弃采石场与地底坑道',
    '区域四：银溪城', '区域五：赤脊山隘与风暴祭坛', '区域六：龙陨冰原', '区域七：雄狮之拱'
  ];
  erosion.innerHTML = erosionAreas.map(area => {
    const val = g('区域侵蚀值.世界.' + area, 0);
    const shortName = area.replace(/区域[一二三四五六七]：/, '');
    return `<div class="ds-erosion-item">
      <div class="ds-erosion-name"><span>${shortName}</span><span style="color:${val > 60 ? 'var(--ds-red-bright)' : 'var(--ds-text)'}">${val}%</span></div>
      <div class="ds-bar-track" style="height:8px;"><div class="ds-bar-fill ${val > 60 ? 'crimson' : val > 30 ? 'red' : 'gold'}" style="width:${val}%"></div></div>
    </div>`;
  }).join('');

  // 契约
  document.getElementById('ds-contract').textContent = g('主角外貌.已签订契约', '无');

  /* ── TAB 6: 伙伴 ── */
  const companions = document.getElementById('ds-companions');
  const allyKeys = ['伙伴一', '伙伴二', '伙伴三', '伙伴四'];
  companions.innerHTML = allyKeys.map(key => {
    const name = g('核心伙伴.' + key + '.名称', '空');
    const isEmpty = name === '空' || name === '--';
    const favor = g('核心伙伴.' + key + '.好感度', 0);
    const status = g('核心伙伴.' + key + '.状态', '未知');
    if (isEmpty) return `<div class="ds-companion-card empty"><div class="ds-companion-name"><i class="fas fa-user-plus"></i> 空槽位</div><div style="font-size:12px;color:var(--ds-text-dim);">尚无伙伴加入</div></div>`;
    return `<div class="ds-companion-card ds-ripple">
      <div class="ds-companion-name"><i class="fas fa-user-shield"></i> ${name} <span class="ds-companion-status">${status}</span></div>
      ${makeBar('好感度', favor, 100, 'gold')}
      ${makeProp('装备', g('核心伙伴.' + key + '.装备'))}
      ${makeProp('当前任务', g('核心伙伴.' + key + '.当前任务'))}
      ${makeProp('功能', g('核心伙伴.' + key + '.功能'))}
      ${makeProp('职责', g('核心伙伴.' + key + '.职责'))}
    </div>`;
  }).join('');

  /* ── 在场角色 ── */
  document.getElementById('ds-present').textContent = g('在场角色追踪.在场角色', '无') || '无';

  /* ── 标签页切换 ── */
  document.querySelectorAll('#ds-status-panel .ds-tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const targetId = this.getAttribute('data-tab');
      document.querySelectorAll('#ds-status-panel .ds-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#ds-status-panel .ds-tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      const target = document.getElementById(targetId);
      if (target) target.classList.add('active');
    });
  });

  /* ── 点击涟漪效果 ── */
  document.querySelectorAll('#ds-status-panel .ds-ripple').forEach(el => {
    el.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple-effect';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });

})();
</script>
</body>
</html>
